  function triggerLidPlacePulse(color, idx) {
    if (boardWrap.classList.contains('lid-win-pulse')) return;
    const isYellow = color === 'yellow';
    const burstColor = isYellow ? 'rgba(245,200,0,0.88)' : 'rgba(21,120,63,0.9)';
    const burstGlow = isYellow ? 'rgba(245,200,0,0.78)' : 'rgba(21,120,63,0.8)';
    boardWrap.style.setProperty('--lid-place-color', burstColor);
    boardWrap.style.setProperty('--lid-place-glow', burstGlow);
    boardWrap.classList.remove('lid-place-pulse');
    void boardWrap.offsetWidth;
    boardWrap.classList.add('lid-place-pulse');
    boardWrap.addEventListener('animationend', () => boardWrap.classList.remove('lid-place-pulse'), { once: true });
    pulseBoardScene('lid-weight-hit', 650);

    const info = Number.isInteger(idx) ? slotInfo[idx] : null;
    if (info) {
      const r = boardWrap.getBoundingClientRect();
      const burst = document.createElement('div');
      burst.className = 'lid-place-burst';
      burst.style.setProperty('--burst-x', (r.left + r.width * info.x / 200).toFixed(1) + 'px');
      burst.style.setProperty('--burst-y', (r.top + r.height * info.y / 200).toFixed(1) + 'px');
      burst.style.setProperty('--burst-color', burstColor);
      burst.style.setProperty('--burst-glow', burstGlow);
      document.body.appendChild(burst);
      runLater(() => burst.remove(), 1150);
    }
  }

  function clearVictoryEffects() {
    victoryRainRun++;
    if (victoryRainFrame !== null) {
      cancelAnimationFrame(victoryRainFrame);
      victoryRainFrame = null;
    }
    document.querySelectorAll('.victory-cannon-die, .victory-settled-die, .victory-floor-die, .victory-rain-die, .victory-dice-floor, .victory-dice-rain, .victory-screen-burst, .victory-lid-backdrop, .victory-lid-hero, .victory-can-hero').forEach(el => el.remove());
    boardWrap.classList.remove('game-win-spin');
    trashCan.classList.remove('victory-erupt');
  }

  function createVictoryDiceRain(winner) {
    const rain = document.createElement('div');
    rain.className = 'victory-dice-rain';
    overlay.appendChild(rain);

    const diceCount = FAST_PREVIEW_ENABLED
      ? Math.round(clamp(28 + totalTrashedDice() * 0.32, 34, 58))
      : Math.round(clamp(220 + totalTrashedDice() * 2.4, 240, 340));
    const winnerGreenBias = winner === 'p2' ? 0.66 : 0.42;
    const run = ++victoryRainRun;
    let i = 0;

    function makeRainDie() {
      const color = Math.random() < winnerGreenBias ? 'green' : 'yellow';
      const isGreen = color === 'green';
      const die = makeMiniDie(color, Math.floor(Math.random() * 6) + 1, 'victory-rain-die');
      const duration = Math.round(3900 + Math.random() * 4400);
      const delay = Math.round(-duration + Math.random() * (duration + 900));
      die.style.setProperty('--rain-left', (Math.random() * 100).toFixed(2) + '%');
      die.style.setProperty('--drift', Math.round(-86 + Math.random() * 172) + 'px');
      die.style.setProperty('--fall-duration', duration + 'ms');
      die.style.setProperty('--fall-delay', delay + 'ms');
      die.style.setProperty('--r0', Math.round(Math.random() * 360) + 'deg');
      die.style.setProperty('--rx', Math.round(-38 + Math.random() * 76) + 'deg');
      die.style.setProperty('--ry', Math.round(-44 + Math.random() * 88) + 'deg');
      die.style.setProperty('--spin', Math.round((Math.random() < 0.5 ? -1 : 1) * (420 + Math.random() * 900)) + 'deg');
      die.style.setProperty('--s', (0.58 + Math.random() * 0.78).toFixed(2));
      die.style.setProperty('--rain-side-hi', isGreen ? '#17884a' : '#ffe153');
      die.style.setProperty('--rain-side-mid', isGreen ? '#0a5b2f' : '#c99b00');
      die.style.setProperty('--rain-side-dark', isGreen ? '#042b17' : '#725400');
      die.style.setProperty('--rain-edge', isGreen ? 'rgba(2,33,18,0.72)' : 'rgba(117,80,0,0.68)');
      return die;
    }

    function appendRainBatch() {
      if (run !== victoryRainRun || !rain.isConnected) return;
      const frag = document.createDocumentFragment();
      const batchSize = FAST_PREVIEW_ENABLED ? 12 : 34;
      const end = Math.min(i + batchSize, diceCount);
      for (; i < end; i++) frag.appendChild(makeRainDie());
      rain.appendChild(frag);
      if (i < diceCount) {
        victoryRainFrame = requestAnimationFrame(appendRainBatch);
      } else {
        victoryRainFrame = null;
      }
    }

    appendRainBatch();
  }

  function triggerGameWinCelebration(winner) {
    clearVictoryEffects();
    const burst = document.createElement('div');
    burst.className = 'victory-screen-burst';
    overlay.appendChild(burst);
    runLater(() => burst.remove(), 1700);

    const lidBackdrop = document.createElement('div');
    lidBackdrop.className = 'victory-lid-backdrop';
    overlay.insertBefore(lidBackdrop, overlay.firstChild);

    let lidSvg = boardWrap.querySelector('svg.lid-svg');
    if (!lidSvg) {
      buildSlots();
      lidSvg = boardWrap.querySelector('svg.lid-svg');
    }
    if (lidSvg) {
      const lidHero = document.createElement('div');
      lidHero.className = 'victory-lid-hero';
      lidHero.appendChild(lidSvg.cloneNode(true));
      overlay.insertBefore(lidHero, overlay.firstChild);
    }

    const canHero = document.createElement('div');
    canHero.className = 'victory-can-hero';
    const canSvg = trashCan.querySelector('svg');
    if (canSvg) canHero.appendChild(canSvg.cloneNode(true));
    overlay.appendChild(canHero);

    createVictoryDiceRain(winner);

    boardWrap.classList.remove('game-win-spin');
    void boardWrap.offsetWidth;
    boardWrap.classList.add('game-win-spin');
    boardWrap.addEventListener('animationend', () => boardWrap.classList.remove('game-win-spin'), { once: true });

    trashCan.classList.remove('victory-erupt');
    void trashCan.offsetWidth;
    trashCan.classList.add('victory-erupt');
    trashCan.addEventListener('animationend', () => trashCan.classList.remove('victory-erupt'), { once: true });

    if (winner === 'p1') {
      Audio.megaWinFanfare();
    } else {
      Audio.trashCrash(Math.max(9, totalTrashedDice()));
      Audio.megaWinFanfare();
    }
  }

  // ── UI SYNC ──────────────────────────────────────────────────
  function syncUI() {
    renderPoolCounts();
    p1TurnTag.classList.toggle('active', current === 'p1');
    p2TurnTag.classList.toggle('active', current === 'p2');
    updatePoolVisual('p1');
    updatePoolVisual('p2');

    const isP1 = current === 'p1';
    p1StatusBar.classList.toggle('active', isP1);
    p1TurnDot.style.background = '#f5c800';
    rollBtn.className = 'roll-btn ' + current;
    p1Die.classList.toggle('ready-p1', p1Die.classList.contains('idle'));
    p2Die.classList.toggle('ready-p2', p2Die.classList.contains('idle'));
    renderCanLoad();
  }

  function setMsg(text, type) {
    msgEl.textContent = text;
    msgEl.className   = 'message' + (type ? ' ' + type : '');
  }

  function clearP0Timer() {
    if (p0Timer) {
      cancelRuntimeTimer(p0Timer);
      p0Timer = null;
    }
  }

  function scheduleP0Autoplay(delay = P0_AUTOPLAY_MS) {
    clearP0Timer();
    if (!p0Autoplay || !gameStarted || busy || overlay.classList.contains('show')) return;
    if (current !== 'p1' || rollBtn.disabled || totalDice('p1') <= 0) return;
    p0Timer = runLater(() => {
      p0Timer = null;
      if (!p0Autoplay || busy || current !== 'p1' || rollBtn.disabled || overlay.classList.contains('show')) return;
      doRoll();
    }, delay);
  }

  function setP0Autoplay(enabled, announce = true) {
    p0Autoplay = !!enabled;
    document.body.classList.toggle('debug-p0', p0Autoplay);
    if (p0Autoplay) {
      if (announce && gameStarted) setMsg('AUTOPLAY ON');
      scheduleP0Autoplay();
    } else {
      clearP0Timer();
      if (announce && gameStarted && current === 'p1') setMsg('YELLOW ROLL');
    }
    return p0Autoplay;
  }

  function startGameFromOverlay(playAudio = true) {
    if (gameStarted) return;
    const so = document.getElementById('startOverlay');
    const startBtn = document.getElementById('startBtn');
    startBtn.disabled = true;
    so.classList.add('hide');
    runLater(() => { so.style.display = 'none'; }, 520);
    if (playAudio) Audio.startFanfare();
    init();
  }

  function openingRoll() {
    let p1;
    let p2;
    do {
      p1 = Math.floor(Math.random() * 6) + 1;
      p2 = Math.floor(Math.random() * 6) + 1;
    } while (p1 === p2);
    return { p1, p2, starter: p1 > p2 ? 'p1' : 'p2' };
  }

  // ── INIT ─────────────────────────────────────────────────────
  function init() {
    clearRuntimeTimers();
    clearVictoryEffects();
    document.querySelectorAll('.travelling-die, .can-pour-die, .lid-place-burst, .claim-badge').forEach(el => el.remove());
    trashCan.classList.remove('flash', 'pour', 'victory-erupt');
    trashCan.style.animationDuration = '';
    boardScene.classList.remove('lid-weight-hit', 'can-weight-hit');

    const so = document.getElementById('startOverlay');
    if (so) {
      so.classList.add('hide');
      so.style.display = 'none';
    }

    board     = Array(6).fill(null);
    pools     = { p1: { yellow: 20, green: 0 }, p2: { yellow: 0, green: 20 } };
    resetPoolFaces();
    trashed   = { p1: 0,  p2: 0  };
    trashDice = [];
    current   = 'p1';
    round     = 1;
    busy      = false;
    totalRolls= 0;
    gameStarted = true;

    overlay.classList.remove('show', 'victory', 'loss', 'winner-yellow', 'winner-green');

    requestAnimationFrame(() => {
      buildSlots();
      clearDie(null);
      const opener = openingRoll();
      current = opener.starter;
      renderDie(opener.p1, 'p1', 'yellow');
      renderDie(opener.p2, 'p2', 'green');
      syncUI();
      setMsg(`${PLAYER_NAME[current].toUpperCase()} STARTS`);
      if (current === 'p1') clearDie('p1');
      rollBtn.disabled = current !== 'p1';
      if (current === 'p2') runLater(() => doRoll(), 1150);
      scheduleP0Autoplay(1200);
    });
  }

  // ── ROLL ─────────────────────────────────────────────────────
  rollBtn.addEventListener('click', doRoll);
  playAgainBtn.addEventListener('click', init);

  function doRoll() {
    clearP0Timer();
    if (busy) return;
    if (current === 'p1' && rollBtn.disabled) return; // only block human; green rolls freely
    busy = true;
    rollBtn.disabled = true;
    totalRolls++;

    const rollColor = takeDie(current);
    if (!rollColor) {
      gameOver(current === 'p1' ? 'p2' : 'p1');
      return;
    }

    const value = forcedRolls.length ? forcedRolls.shift() : Math.floor(Math.random() * 6) + 1;

    // Start tumble + spinning pip values
    const activeDie = getDie(current);
    activeDie.className = 'die ' + colorClass(rollColor) + ' rolling';
    setPips(Math.floor(Math.random() * 6) + 1, current);
    Audio.rollLoop(ROLL_ANIMATION_MS);

    // Fast phase (80–1000ms every 85ms) then slow phase (1100–1430ms every 165ms)
    const spinAt = [];
    for (let t = 55;  t <= 620; t += 65)  spinAt.push(t);
    for (let t = 700; t <= 805; t += 105) spinAt.push(t);
    const spinHandles = spinAt.map(t =>
      runLater(() => setPips(Math.floor(Math.random() * 6) + 1, current), t)
    );

    runLater(() => {
      spinHandles.forEach(cancelRuntimeTimer);
      renderDie(value, current, rollColor);
      getDie(current).classList.add('roll-resolved');
      Audio.rollResolve(value);
      const idx   = value - 1;
      const taken = board[idx] !== null;
      setMsg(`ROLLED ${value}`);
      runLater(() => {
        taken
          ? travelRolledDieToTrash(current, rollColor, () => handleTrash(value, idx, rollColor))
          : travelRolledDieToSlot(current, rollColor, idx, () => handlePlace(value, idx, rollColor));
      }, ROLL_REVEAL_HOLD_MS);
    }, ROLL_ANIMATION_MS);
  }

  function handlePlace(value, idx, color) {
    board[idx] = { player: current, color, value };

    const slot  = slotEls[idx];
    paintSlot(idx, board[idx]);
    slot.classList.add('anim-place');
    slot.addEventListener('animationend', () => slot.classList.remove('anim-place'), { once: true });

    setMsg(`LID ${value}!`, 'ok');
    Audio.placeClink();
    const scoreColor = playerScoreColor(current);
    Audio.placeFanfare(scoreColor);
    triggerLidPlacePulse(scoreColor, idx);
    syncUI();

    const filled = board.filter(s => s !== null).length;
    if (filled === 6) {
      triggerLidWinPulse();
      runLater(endRound, TURN_HANDOFF_MS);
    } else if (totalDice(current) <= 0) {
      const winner = current === 'p1' ? 'p2' : 'p1';
      runLater(() => gameOver(winner), 520);
    } else {
      runLater(nextTurn, TURN_HANDOFF_MS);
    }
  }

  function handleTrash(value, idx, color) {
    trashed[current]++;
    trashDice.push({ player: current, color, value });

    const slot = slotEls[idx];
    slot.classList.add('anim-trash');
    slot.addEventListener('animationend', () => slot.classList.remove('anim-trash'), { once:true });

    setMsg(`TRASH ${value}!`, 'trash');
    const canLoad = totalTrashedDice();
    triggerTrashCanImpact(canLoad);
    Audio.trashCrash(canLoad);
    syncUI();

    if (totalDice(current) <= 0) {
      const winner = current === 'p1' ? 'p2' : 'p1';
      runLater(() => gameOver(winner), 950);
      return;
    }

    runLater(nextTurn, TURN_HANDOFF_MS + 250);
  }

  // ── DICE FLY TO POOL ─────────────────────────────────────────
  function spillDurationForDice(diceWon) {
    const count = Math.max(1, diceWon);
    return clamp(1300 + count * 520 + Math.max(0, count - 6) * 180, 1600, 9000);
  }

  function animateCanPourToPool(winner, lidDice, spillDuration = spillDurationForDice(lidDice.length), spillLoad = lidDice.length, onDieArrive = null) {
    const pileEl  = winner === 'p1' ? p1Pile : p2Pile;
    const pileR   = pileEl.getBoundingClientRect();
    const canR = trashCan.getBoundingClientRect();
    const diceWon = Math.max(1, lidDice.length);
    const visualLoad = Math.max(diceWon, spillLoad);
    const travelMs = clamp(700 + visualLoad * 28, 820, 1250);
    const pourLeadInMs = 220;
    const pourTailMs = 360;
    const canShakeMs = clamp(spillDuration * 0.92, 1300, 8500);
    const canDrainCount = Array.isArray(trashDice) ? trashDice.length : 0;
    const canDrainSpan = Math.max(0, spillDuration - travelMs - pourLeadInMs - pourTailMs);
    trashCan.classList.remove('pour');
    void trashCan.offsetWidth;
    trashCan.style.animationDuration = canShakeMs + 'ms';
    trashCan.classList.add('pour');

    lidDice.forEach((die, i) => {
      const sx = canR.left + canR.width * (0.35 + Math.random() * 0.3);
      const sy = canR.top + canR.height * (0.25 + Math.random() * 0.1);
      const tx = pileR.left + pileR.width * (0.25 + Math.random() * 0.5);
      const ty = pileR.top + pileR.height * (0.25 + Math.random() * 0.5);
      const dieValue = clamp(Math.floor(die.value || ((i % 6) + 1)), 1, 6);
      const el = makeMiniDie(die.color, dieValue, 'can-pour-die');
      const available = Math.max(0, spillDuration - travelMs - pourLeadInMs - pourTailMs);
      const delay = pourLeadInMs + (diceWon === 1 ? 0 : i * (available / (diceWon - 1)));
      const dx = tx - sx;
      const dy = ty - sy;
      const arc = clamp(125 + visualLoad * 4 + Math.random() * 56, 140, 300);
      el.style.left = sx + 'px';
      el.style.top = sy + 'px';
      el.style.setProperty('--payout-duration', travelMs + 'ms');
      el.style.setProperty('--payout-delay', Math.round(delay) + 'ms');
      el.style.setProperty('--mx', (dx * (0.35 + Math.random() * 0.22)).toFixed(1) + 'px');
      el.style.setProperty('--my', (dy * 0.35 - arc).toFixed(1) + 'px');
      el.style.setProperty('--tx', dx.toFixed(1) + 'px');
      el.style.setProperty('--ty', dy.toFixed(1) + 'px');
      el.style.setProperty('--r0', (i * 17 - 42) + 'deg');
      el.style.setProperty('--r1', (80 + i * 19) + 'deg');
      el.style.setProperty('--r2', (180 + i * 23) + 'deg');
      el.style.setProperty('--r3', (220 + i * 29) + 'deg');
      document.body.appendChild(el);
      if (typeof onDieArrive === 'function') {
        runLater(() => onDieArrive(die, i), Math.round(delay + travelMs * 0.82));
      }
      runLater(() => el.remove(), delay + travelMs + pourTailMs);
    });

    for (let i = 0; i < canDrainCount; i++) {
      const delay = pourLeadInMs + (canDrainCount === 1 ? 0 : i * (canDrainSpan / (canDrainCount - 1)));
      runLater(() => {
        if (!Array.isArray(trashDice) || trashDice.length === 0) return;
        trashDice = trashDice.slice(0, -1);
        renderCanLoad();
      }, delay + 40);
    }

    runLater(() => {
      trashCan.classList.remove('pour');
      trashCan.style.animationDuration = '';
    }, canShakeMs + 80);
    return spillDuration;
  }

  function showClaimBadge(winner, lidDice, spillDuration = 1450) {
    const pileEl = winner === 'p1' ? p1Pile : p2Pile;
    const r = pileEl.getBoundingClientRect();
    const badge = document.createElement('div');
    const main = document.createElement('div');
    const sub = document.createElement('div');
    badge.className = 'claim-badge ' + winner;
    main.className = 'claim-main';
    sub.className = 'claim-sub';
    main.textContent = `WINNER +${lidDice.length}`;
    sub.textContent = winner === 'p1' ? 'DICE TO YELLOW PILE' : 'DICE TO GREEN PILE';
    badge.appendChild(main);
    badge.appendChild(sub);
    badge.style.left = clamp(r.left + r.width / 2, 82, window.innerWidth - 82) + 'px';
    badge.style.top = clamp(r.top + r.height / 2, 58, window.innerHeight - 58) + 'px';
    document.body.appendChild(badge);
    runLater(() => badge.remove(), clamp(spillDuration + 500, 1700, 9500));
  }

  // ── ROUND WIN ────────────────────────────────────────────────
  function endRound() {
    const winner = current;
    const lidDice = board.filter(Boolean);
    const canDice = Array.isArray(trashDice) ? trashDice.slice() : [];
    const claimedDice = lidDice.concat(canDice);
    const spillLoad = claimedDice.length;
    const spillDuration = spillDurationForDice(spillLoad);

    setMsg(`${PLAYER_NAME[winner].toUpperCase()} WINS THE ROUND!`, 'win');

    // Flash
    roundFlash.className = '';
    void roundFlash.offsetWidth;
    roundFlash.className = 'round-flash ' + winner;
    triggerTitleRoundWinFanfare();
    Audio.roundWonFanfare(spillDuration);

    // Trash can empties the claimed set into the winner's pile.
    showClaimBadge(winner, claimedDice, spillDuration);
    animateCanPourToPool(winner, claimedDice, spillDuration, spillLoad, die => {
      pools[winner][die.color]++;
      renderPoolCounts();
      appendPoolDieVisual(winner, die);
      pulsePoolCount(winner);
    });

    // Reset the board only after the full bounty spill finishes.
    runLater(() => {
      board = Array(6).fill(null);
      trashDice = [];
      round++;
      syncUI();
    }, spillDuration);

    runLater(() => {
      slotEls.forEach((s, i) => {
        s.setAttribute('fill',   'url(#pocketG)');
        s.setAttribute('stroke', '#aeb6b6');
        s.classList.remove('anim-place', 'anim-trash');
        labelEls[i].setAttribute('fill', 'rgba(45,50,51,0.52)');
        if (slotDiceEls[i]) {
          slotDiceEls[i].remove();
          slotDiceEls[i] = null;
        }
      });

      if (totalDice('p1') <= 0) { gameOver('p2'); return; }
      if (totalDice('p2') <= 0) { gameOver('p1'); return; }

      current = winner;
      clearDie(null);
      syncUI();
      if (current === 'p2') {
        rollBtn.disabled = true;
        runLater(() => { busy = false; doRoll(); }, CPU_START_MS);
      } else {
        setMsg('YELLOW ROLL');
        rollBtn.disabled = false;
        busy = false;
        scheduleP0Autoplay();
      }
    }, spillDuration + 260);
  }

  // ── GAME OVER ────────────────────────────────────────────────
  function gameOver(winner) {
    clearRuntimeTimers();
    busy = true;
    const playerWon = winner === 'p1';
    overlayTitle.innerHTML = playerWon
      ? '<span class="win-line">YELLOW PLAYER</span><span class="win-line">WINS!</span>'
      : '<span class="win-line">GREEN PLAYER</span><span class="win-line">WINS!</span>';
    overlaySub.textContent = 'ROLL, WIN, AVOID THE BIN!';
    overlayStats.textContent = '';
    playAgainBtn.textContent = 'PLAY AGAIN';
    overlay.classList.remove('victory', 'loss', 'winner-yellow', 'winner-green');
    overlay.classList.add('victory', playerWon ? 'winner-yellow' : 'winner-green');
    overlay.classList.add('show');
    triggerGameWinCelebration(winner);
  }

  function installQaHooks() {
    if (!QA_ENABLED) return;
    function ensureQaGame() {
      if (!gameStarted) init();
    }
    window.TrashDiceQA = {
      queueRolls(values) {
        forcedRolls = values.map(v => clamp(Math.floor(v), 1, 6));
        return forcedRolls.slice();
      },
      trashLoad(count = 8) {
        ensureQaGame();
        const load = Math.max(0, Math.floor(count));
        trashed.p1 = Math.ceil(load / 2);
        trashed.p2 = Math.floor(load / 2);
        trashDice = Array.from({ length: load }, (_, i) => ({
          player: i % 2 ? 'p2' : 'p1',
          color: i % 2 ? 'green' : 'yellow',
          value: (i % 6) + 1
        }));
        renderCanLoad();
        triggerTrashCanImpact(totalTrashedDice());
        Audio.trashCrash(totalTrashedDice());
        return { trashed: { ...trashed }, total: totalTrashedDice() };
      },
      roundWin(winner = 'p1') {
        ensureQaGame();
        current = winner === 'p2' ? 'p2' : 'p1';
        board = Array.from({ length: 6 }, (_, i) => ({
          player: i % 2 ? 'p2' : 'p1',
          color: i % 2 ? 'green' : 'yellow',
          value: i + 1
        }));
        buildSlots();
        board.forEach((die, i) => paintSlot(i, die));
        syncUI();
        triggerLidWinPulse();
        runLater(endRound, TURN_HANDOFF_MS);
        return { current, board: board.map(Boolean) };
      },
      gameWin(winner = 'p1') {
        ensureQaGame();
        gameOver(winner === 'p2' ? 'p2' : 'p1');
        return winner;
      },
      state() {
        return {
          current,
          round,
          pools: JSON.parse(JSON.stringify(pools)),
          trashed: { ...trashed },
          trashDice: trashDice ? trashDice.slice() : [],
          board: board.map(Boolean),
          forcedRolls: forcedRolls.slice()
        };
      }
    };
  }

  // ── NEXT TURN ────────────────────────────────────────────────
  function nextTurn() {
    current = current === 'p1' ? 'p2' : 'p1';

    if (totalDice(current) <= 0) {
      const winner = current === 'p1' ? 'p2' : 'p1';
      gameOver(winner);
      return;
    }

    clearDie(current);
    syncUI();
    if (current === 'p2') {
      rollBtn.disabled = true;
      runLater(() => { busy = false; doRoll(); }, CPU_START_MS);
    } else {
      setMsg('YELLOW ROLL');
      rollBtn.disabled = false;
      busy = false;
      scheduleP0Autoplay();
    }
  }

  // ── BOOT ─────────────────────────────────────────────────────
  document.getElementById('startBtn').addEventListener('click', () => startGameFromOverlay(true));

  let debugKeyBuffer = '';
  document.addEventListener('keydown', (event) => {
    const key = event.key.toLowerCase();
    if (!/^[a-z0-9]$/.test(key)) return;
    debugKeyBuffer = (debugKeyBuffer + key).slice(-2);
    if (debugKeyBuffer === 'p0') {
      if (!gameStarted) startGameFromOverlay(true);
      setP0Autoplay(!p0Autoplay);
      debugKeyBuffer = '';
    }
  });

  window.TrashDiceDebug = {
    p0(enabled) {
      if (!gameStarted) startGameFromOverlay(false);
      return setP0Autoplay(typeof enabled === 'boolean' ? enabled : !p0Autoplay);
    },
    state() {
      return { p0Autoplay, current, busy, round, totalRolls };
    }
  };

  function clearOneShotQaPreviewUrl() {
    try {
      window.history.replaceState(null, '', window.location.pathname);
    } catch (error) {
      // Non-critical: the QA scene still works if history replacement is blocked.
    }
  }

  window.addEventListener('load', () => {
    // Pre-build slots so board is visible behind start overlay
    requestAnimationFrame(buildSlots);
    installQaHooks();
    if (QA_ENABLED && URL_OPTIONS.has('gamewin')) {
      clearOneShotQaPreviewUrl();
      if (FORCE_QA_ENABLED) {
        const forcedWinner = URL_OPTIONS.get('gamewin') === 'p2' ? 'p2' : 'p1';
        runLater(() => window.TrashDiceQA.gameWin(forcedWinner), 120);
        return;
      }
      overlay.classList.add('show');
      return;
    }
    if (QA_ENABLED && URL_OPTIONS.has('roundwin')) {
      clearOneShotQaPreviewUrl();
      if (FORCE_QA_ENABLED) {
        const forcedWinner = URL_OPTIONS.get('roundwin') === 'p2' ? 'p2' : 'p1';
        runLater(() => window.TrashDiceQA.roundWin(forcedWinner), 120);
        return;
      }
      overlay.classList.add('show');
      return;
    }
    if (P0_START_ENABLED) {
      setP0Autoplay(true, false);
      startGameFromOverlay(false);
    }
  });
  window.addEventListener('resize', () => {
    if (!slotEls.length) return;
    buildSlots();
    if (!Array.isArray(board)) return;
    board.forEach((die, i) => {
      if (die) paintSlot(i, die);
    });
  });

})();
</script>
</body>
</html>
