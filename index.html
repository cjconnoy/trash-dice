<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Trash Dice</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Chewy&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root {
  --yellow:      #f5c800;
  --yellow-dark: #c9a000;
  --yellow-pip:  #1a5c1a;
  --green:       #0f5f32;
  --green-light: #15783f;
  --green-pip:   #f5c800;
  --bg:          #eee9dd;
  --surface:     #f7f3ea;
  --board-rim:   #5a5a5a;
  --board-bg:    #444;
  --slot-empty:  #2e2e2e;
  --text:        #17361f;
  --trash-red:   #d93030;
  --plastic-hi:   #d9dfdf;
  --plastic-mid:  #8f9a9a;
  --plastic-low:  #515a5c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'Fredoka One', 'Arial Black', sans-serif;
  color: var(--text);
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 0.4rem 0.5rem;
  gap: 0.35rem;
  min-height: 100dvh;
  background:
    radial-gradient(ellipse at 50% 42%, rgba(255,255,255,0.95), rgba(245,242,234,0.86) 42%, rgba(214,205,190,0.72) 78%, rgba(184,174,160,0.88) 100%),
    linear-gradient(180deg, #faf8f2 0%, #ddd5c8 100%);
}

/* ── GRAFFITI TITLE ── */
.title-wrap {
  display: flex;
  flex-direction: row;
  align-items: baseline;
  justify-content: center;
  gap: 0.05em;
  position: relative;
  padding: 0.1rem 0.5rem;
  z-index: 10;
}
.hero-title {
  transform-origin: 50% 0%;
  will-change: transform, filter;
}
.hero-title.round-win-title-fanfare {
  z-index: 96;
  animation: titleRoundWinFanfare 1.18s cubic-bezier(.12,.86,.14,1) both;
}
.hero-title.round-win-title-fanfare .title-logo {
  animation: titleRoundWinGlow 1.18s cubic-bezier(.12,.86,.14,1) both;
}
@keyframes titleRoundWinFanfare {
  0% {
    transform: translateY(0) scale(1) rotate(0deg);
  }
  16% {
    transform: translateY(10px) scale(2.02) rotate(-2.5deg);
  }
  33% {
    transform: translateY(5px) scale(0.96) rotate(1deg);
  }
  52% {
    transform: translateY(-8px) scale(1.34) rotate(-1deg);
  }
  70% {
    transform: translateY(2px) scale(1.08) rotate(0.5deg);
  }
  100% {
    transform: translateY(0) scale(1) rotate(0deg);
  }
}
@keyframes titleRoundWinGlow {
  0%, 100% {
    filter: drop-shadow(4px 6px 0 rgba(15,95,50,0.78)) drop-shadow(0 4px 5px rgba(60,48,30,0.24));
  }
  18% {
    filter:
      drop-shadow(7px 10px 0 rgba(15,95,50,0.92))
      drop-shadow(0 0 24px rgba(255,235,105,0.92))
      drop-shadow(0 16px 28px rgba(60,48,30,0.38));
  }
  52% {
    filter:
      drop-shadow(5px 8px 0 rgba(15,95,50,0.86))
      drop-shadow(0 0 18px rgba(255,235,105,0.74))
      drop-shadow(0 10px 18px rgba(60,48,30,0.28));
  }
}
.title-wrap.big {
  flex-direction: column;
  align-items: center;
  gap: 0.05rem;
  padding: 0.5rem 1rem 0.3rem;
}
.title-logo {
  width: clamp(208px, 45vw, 318px);
  height: auto;
  display: block;
  overflow: visible;
  filter: drop-shadow(4px 6px 0 rgba(15,95,50,0.78)) drop-shadow(0 4px 5px rgba(60,48,30,0.24));
}
.title-wrap.big .title-logo {
  width: clamp(270px, 76vw, 430px);
  filter: drop-shadow(5px 7px 0 rgba(15,95,50,0.82)) drop-shadow(0 7px 10px rgba(60,48,30,0.25));
}
.title-hero-glint {
  pointer-events: none;
  mix-blend-mode: screen;
}
.title-glint-word {
  font-family: 'Chewy', 'Cooper Black', 'Cooper Std Black', 'Fredoka One', 'Arial Black', sans-serif;
  fill: url(#topTitleGlintG);
  stroke: none;
  stroke-linejoin: round;
  paint-order: stroke fill;
}
.logo-word {
  font-family: 'Chewy', 'Cooper Black', 'Cooper Std Black', 'Fredoka One', 'Arial Black', sans-serif;
  fill: #ff8f52;
  stroke: #0f5f32;
  stroke-linejoin: round;
  paint-order: stroke fill;
}
.logo-word.backing {
  fill: none;
  stroke: #f5c800;
  opacity: 0.92;
}
.logo-kicker {
  font-family: 'Fredoka One', 'Arial Black', sans-serif;
  fill: #fff3b0;
  stroke: #0f5f32;
  stroke-width: 0.9;
  paint-order: stroke fill;
  letter-spacing: 0.04em;
}
.logo-outer {
  font-family: 'Chewy', 'Cooper Black', 'Cooper Std Black', 'Fredoka One', 'Arial Black', sans-serif;
  fill: none;
  stroke: #08632d;
  stroke-linejoin: round;
  paint-order: stroke fill;
}
.logo-warm-shadow {
  font-family: 'Chewy', 'Cooper Black', 'Cooper Std Black', 'Fredoka One', 'Arial Black', sans-serif;
  fill: #ef7040;
  stroke: #08632d;
  stroke-linejoin: round;
  paint-order: stroke fill;
}
.logo-face {
  font-family: 'Chewy', 'Cooper Black', 'Cooper Std Black', 'Fredoka One', 'Arial Black', sans-serif;
  fill: #ffb53c;
  stroke: #08632d;
  stroke-linejoin: round;
  paint-order: stroke fill;
}
.title-trash {
  font-family: 'Bangers', 'Impact', sans-serif;
  font-size: clamp(2.2rem, 8vw, 3.8rem);
  color: #ff8a3c;
  -webkit-text-stroke: 2px #23621d;
  text-shadow:
    0 0 0 #23621d,
    3px 3px 0 #f5c800,
    5px 5px 0 #0f5f32,
    1px 1px 8px rgba(0,0,0,0.7);
  transform: rotate(-5deg) translateY(4px);
  display: inline-block;
  letter-spacing: 0.06em;
  line-height: 1;
}
.title-dice {
  font-family: 'Bangers', 'Impact', sans-serif;
  font-size: clamp(2.6rem, 9.5vw, 4.5rem);
  color: #ff8a3c;
  -webkit-text-stroke: 2.5px #23621d;
  text-shadow:
    3px 3px 0 #f5c800,
    5px 5px 0 #0f5f32,
    6px 7px 10px rgba(0,0,0,0.65);
  transform: rotate(-2deg);
  display: inline-block;
  letter-spacing: 0.08em;
  line-height: 1;
}
.title-wrap.big .title-trash {
  font-size: clamp(4rem, 18vw, 7rem);
  -webkit-text-stroke: 3.5px #1a5c1a;
  transform: rotate(-6deg) translateY(6px);
}
.title-wrap.big .title-dice {
  font-size: clamp(4.8rem, 22vw, 8.5rem);
  -webkit-text-stroke: 4px #5ee85e;
}
.splatter {
  position: absolute;
  border-radius: 52% 48% 60% 40% / 55% 45% 58% 42%;
  pointer-events: none;
  opacity: 0.72;
  z-index: 0;
}
.sp-y { background: #f5c800; }
.sp-g { background: #5ee85e; }

.tagline {
  font-size: clamp(0.55rem, 1.8vw, 0.75rem);
  color: #0f5f32;
  letter-spacing: 0.22em;
  text-align: center;
  text-transform: uppercase;
  opacity: 0.86;
}

/* ── CONTEXTUAL TURN BADGES ── */
.status-bar {
  position: absolute;
  left: 50%;
  top: 0.14rem;
  z-index: 12;
  transform: translate(-50%, -50%) scale(0.94);
  background: rgba(255,255,255,0.58);
  border: 1px solid rgba(46,70,57,0.1);
  border-radius: 20px;
  padding: 0.27rem 1rem 0.24rem;
  font-family: 'Bangers', 'Fredoka One', Arial Black, sans-serif;
  font-size: clamp(0.96rem, 2.9vw, 1.18rem);
  letter-spacing: 0.08em;
  white-space: nowrap;
  min-width: clamp(7.2rem, 23vw, 8.4rem);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  opacity: 0;
  pointer-events: none;
  box-shadow: 0 2px 10px rgba(82,69,51,0.12);
  transition: opacity 0.18s, transform 0.22s, background 0.22s, border-color 0.22s, box-shadow 0.22s;
}
.status-bar.active {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}
.status-bar.yellow-turn {
  background: rgba(245,200,0,0.2);
  border-color: rgba(15,95,50,0.26);
  box-shadow: 0 2px 10px rgba(201,160,0,0.16);
}
.status-bar.yellow-turn .status-text {
  color: var(--yellow-pip);
}
.turn-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  transition: background 0.25s;
  box-shadow: inset 1px 1px 1px rgba(0,0,0,0.34), 0 0 8px rgba(255,255,255,0.5);
}

.debug-badge {
  position: fixed;
  right: 10px;
  bottom: 10px;
  z-index: 140;
  display: none;
  padding: 0.28rem 0.55rem;
  border-radius: 6px;
  background: rgba(245,200,0,0.94);
  color: #123418;
  font-family: 'Fredoka One', Arial Black, sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  box-shadow: 0 7px 18px rgba(0,0,0,0.45);
  pointer-events: none;
}
body.debug-p0 .debug-badge { display: block; }
.milestone-badge {
  position: fixed;
  top: 8px;
  left: 8px;
  z-index: 140;
  padding: 0.28rem 0.52rem;
  border-radius: 6px;
  background: rgba(15,95,50,0.92);
  color: #fff3b0;
  border: 1px solid rgba(245,200,0,0.78);
  font-family: 'Fredoka One', Arial Black, sans-serif;
  font-size: clamp(0.52rem, 1.8vw, 0.68rem);
  letter-spacing: 0.07em;
  text-transform: uppercase;
  box-shadow: 0 6px 16px rgba(68,53,30,0.24);
  pointer-events: none;
}

/* ── GAME AREA ── */
.game-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.3rem;
  width: 100%;
  flex: 1;
  min-height: 0;
}

/* ── PLAYER PANELS — horizontal strips ── */
.player-panel {
  --panel-accent: #f5c800;
  --panel-accent-dark: #8b6900;
  --panel-glow: rgba(245,200,0,0.2);
  position: relative;
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: clamp(0.25rem, 1.4vw, 0.5rem);
  width: 100%;
  max-width: 520px;
  padding: clamp(0.42rem, 1.5vw, 0.56rem) clamp(0.52rem, 2vw, 0.76rem);
  background:
    radial-gradient(ellipse at 30% 8%, rgba(255,255,255,0.58), transparent 42%),
    radial-gradient(ellipse at 78% 106%, var(--panel-glow), transparent 54%),
    linear-gradient(180deg, rgba(243,246,238,0.92), rgba(203,211,204,0.84) 54%, rgba(143,157,151,0.72));
  border: 1px solid rgba(255,255,255,0.72);
  border-radius: 8px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.88),
    inset 0 -2px 0 rgba(65,78,73,0.18),
    inset 0 0 0 1px rgba(55,67,62,0.09),
    0 8px 0 rgba(88,97,91,0.18),
    0 16px 28px rgba(72,60,43,0.16);
  overflow: visible;
}
.player-panel.green-panel {
  --panel-accent: #0f6f39;
  --panel-accent-dark: #05331a;
  --panel-glow: rgba(15,95,50,0.22);
}
.player-panel.yellow-panel {
  --panel-accent: #f5c800;
  --panel-accent-dark: #8b6900;
  --panel-glow: rgba(245,200,0,0.22);
}
.player-panel::before {
  content: '';
  position: absolute;
  inset: 5px;
  border-radius: 6px;
  border: 1px solid rgba(43,58,52,0.13);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.62),
    inset 0 -2px 5px rgba(35,45,41,0.12);
  pointer-events: none;
  z-index: 0;
}
.player-panel::after {
  content: '';
  position: absolute;
  left: 6px;
  top: 10px;
  bottom: 10px;
  width: 6px;
  border-radius: 4px;
  background: linear-gradient(180deg, rgba(255,255,255,0.35), var(--panel-accent) 42%, var(--panel-accent-dark));
  box-shadow:
    inset 1px 0 0 rgba(255,255,255,0.35),
    0 0 12px var(--panel-glow);
  pointer-events: none;
  z-index: 1;
}
.player-panel > * {
  position: relative;
  z-index: 2;
}
.player-label {
  font-family: 'Fredoka One', 'Arial Black', sans-serif;
  font-size: clamp(0.58rem, 1.85vw, 0.82rem);
  letter-spacing: 0.045em;
  line-height: 1.05;
  text-transform: uppercase;
  white-space: nowrap;
  min-width: clamp(7.15rem, 22vw, 8.85rem);
  min-height: 1.38rem;
  padding: 0.32rem 0.54rem;
  border-radius: 7px;
  position: relative;
  z-index: 4;
  transform: rotate(-1deg);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.4),
    inset 0 -1px 0 rgba(0,0,0,0.18),
    0 3px 0 var(--panel-accent-dark),
    0 8px 16px rgba(64,54,36,0.13);
}
.player-label.p1 {
  color: var(--yellow-pip);
  background: linear-gradient(180deg, #ffe05b, #f5c800 62%, #d8a900);
  border: 1px solid rgba(15,95,50,0.32);
  text-shadow: 0 1px 0 rgba(255,255,255,0.36);
}
.player-label.p2 {
  color: var(--green-pip);
  background: linear-gradient(180deg, #1f8a49, #0f6b37 62%, #084421);
  border: 1px solid rgba(245,200,0,0.28);
  text-shadow: 0 1px 0 rgba(0,0,0,0.2);
}

/* dice-pool-visual no longer used in panels — piles live on the mat */
.mini-die {
  width: 13px; height: 13px;
  border-radius: 3px;
  flex-shrink: 0;
  box-shadow: 1px 1px 0 rgba(0,0,0,0.4);
  transition: opacity 0.2s;
}
.mini-die.p1 { background: var(--yellow); }
.mini-die.p2 { background: var(--green-light); }

.pool-count {
  --count-face: #f5c800;
  --count-face-hi: #ffe56a;
  --count-face-low: #c89400;
  --count-ink: #0f5f32;
  --count-edge: rgba(15,95,50,0.62);
  font-family: 'Bangers', sans-serif;
  font-size: clamp(1.4rem, 5vw, 2rem);
  line-height: 0.9;
  min-width: clamp(2.45rem, 7.4vw, 3.15rem);
  min-height: clamp(32px, 7vw, 42px);
  padding: 0.16rem 0.32rem 0.1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  flex: 0 0 auto;
  color: var(--count-ink);
  background:
    radial-gradient(ellipse at 30% 15%, rgba(255,255,255,0.62), transparent 42%),
    linear-gradient(180deg, var(--count-face-hi), var(--count-face) 58%, var(--count-face-low));
  border: 1px solid var(--count-edge);
  border-radius: 8px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.52),
    inset 0 -2px 0 rgba(0,0,0,0.16),
    0 3px 0 rgba(72,57,24,0.28),
    0 8px 16px rgba(64,48,28,0.16);
  text-shadow:
    0 1px 0 rgba(255,255,255,0.3),
    0 0 1px rgba(255,255,255,0.45);
}
.pool-count.p1 {
  --count-face: #f5c800;
  --count-face-hi: #ffe56a;
  --count-face-low: #c89400;
  --count-ink: #0f5f32;
  --count-edge: rgba(15,95,50,0.62);
}
.pool-count.p2 {
  --count-face: #0f6f39;
  --count-face-hi: #1f9652;
  --count-face-low: #064421;
  --count-ink: #ffd526;
  --count-edge: rgba(245,200,0,0.5);
  text-shadow:
    0 1px 0 rgba(0,0,0,0.26),
    0 0 1px rgba(0,0,0,0.32);
}
.pool-count.payout-tick {
  animation: poolPayoutTick 0.34s cubic-bezier(.13,.86,.15,1);
}
@keyframes poolPayoutTick {
  0%, 100% {
    transform: translateY(0) scale(1);
    filter: none;
  }
  42% {
    transform: translateY(-4px) scale(1.24);
    filter:
      drop-shadow(0 0 8px rgba(245,200,0,0.62))
      drop-shadow(0 3px 0 rgba(15,95,50,0.42));
  }
}

.pool-sublabel { display: none; }

/* ── BOARD ── */
.board-wrap {
  position: relative;
  width:  clamp(210px, 52vw, 292px);
  height: clamp(210px, 52vw, 292px);
  flex-shrink: 0;
  background: transparent;
}

/* ── SVG SLOT ANIMATIONS ── */
.anim-place { animation: svgPlace 0.68s cubic-bezier(.14,.86,.18,1); }
.anim-trash { animation: svgTrash 0.46s cubic-bezier(.14,.86,.18,1); }
@keyframes svgPlace {
  0%   { filter: brightness(0.7) drop-shadow(0 0 0 rgba(0,0,0,0)); }
  20%  { filter: brightness(0.82) drop-shadow(0 4px 0 rgba(0,0,0,0.55)); }
  48%  { filter: brightness(1.65) saturate(1.22) drop-shadow(0 0 14px rgba(255,255,255,0.72)); }
  72%  { filter: brightness(1.18) saturate(1.08) drop-shadow(0 2px 7px rgba(255,255,255,0.32)); }
  100% { filter: brightness(1) drop-shadow(0 0 0 rgba(0,0,0,0)); }
}
@keyframes svgTrash {
  0%,100% { filter: none; }
  35%     { filter: brightness(0.65) saturate(1.4); }
  68%     { filter: brightness(1.35) saturate(1.7) hue-rotate(310deg); }
}

/* ── BOARD DIV (no extra styling — SVG handles all visuals) ── */
.board-wrap { background: transparent; }

/* ── DIE ── */
.die-wrap {
  --roll-die-size: clamp(70px, 19vw, 108px);
  position: relative;
  flex: 0 0 var(--roll-die-size);
  width: var(--roll-die-size);
  height: var(--roll-die-size);
  aspect-ratio: 1 / 1;
  margin: 0.2rem clamp(0.65rem, 2.4vw, 1rem) 0.2rem clamp(0.2rem, 1vw, 0.45rem);
}
.die-wrap::after {
  content: '';
  position: absolute;
  inset: -8%;
  border-radius: 8px;
  background:
    radial-gradient(circle at 34% 18%, rgba(255,255,255,0.28), transparent 34%),
    linear-gradient(145deg, rgba(59,70,68,0.28), rgba(26,34,32,0.12) 62%, rgba(255,255,255,0.22));
  box-shadow:
    inset 0 2px 4px rgba(255,255,255,0.28),
    inset 0 -4px 8px rgba(22,31,28,0.18),
    0 7px 10px rgba(72,61,43,0.14);
  z-index: 0;
}
.die-wrap .die,
.die-wrap .roll-btn {
  position: relative;
  z-index: 1;
}
.die {
  width: 100%; height: 100%;
  border-radius: 22%;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  padding: clamp(10px, 3vw, 15px);
  gap: 3px;
  transition: background 0.2s;
  box-shadow: 0 4px 14px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
}
.die.p1 {
  background:
    radial-gradient(circle at 27% 20%, rgba(255,255,255,0.88), rgba(255,255,255,0.22) 19%, transparent 34%),
    linear-gradient(148deg, #ffe86a 0%, #f5c800 34%, #dbad00 69%, #9f7600 100%);
  box-shadow:
    7px 8px 0 0 #9a7400,
    13px 14px 0 0 rgba(0,0,0,0.4),
    0 12px 30px rgba(0,0,0,0.55),
    inset 0 0 0 2px rgba(255,255,255,0.18),
    inset -12px -13px 18px rgba(88,62,0,0.25);
  transform: perspective(500px) rotateX(-10deg) rotateY(10deg);
}
.die.p2 {
  background:
    radial-gradient(circle at 27% 20%, rgba(255,255,255,0.58), rgba(255,255,255,0.13) 20%, transparent 35%),
    linear-gradient(148deg, #18864a 0%, #0f6a37 33%, #0a4a29 69%, #052916 100%);
  box-shadow:
    7px 8px 0 0 #042612,
    13px 14px 0 0 rgba(0,0,0,0.45),
    0 12px 30px rgba(0,0,0,0.55),
    inset 0 0 0 2px rgba(255,255,255,0.09),
    inset -12px -13px 18px rgba(0,0,0,0.28);
  transform: perspective(500px) rotateX(-10deg) rotateY(10deg);
}
.die.idle {
  background:
    radial-gradient(circle at 28% 20%, rgba(255,255,255,0.58), rgba(255,255,255,0.08) 32%, transparent 44%),
    linear-gradient(145deg,#4f5353,#222728 72%, #151718);
  box-shadow:
    7px 8px 0 rgba(0,0,0,0.52),
    0 14px 26px rgba(0,0,0,0.42),
    inset -10px -12px 18px rgba(0,0,0,0.28);
  transform: none;
}
.die.idle.ready-p1 {
  background:
    radial-gradient(circle at 28% 20%, rgba(255,255,255,0.78), rgba(255,255,255,0.2) 26%, transparent 42%),
    linear-gradient(145deg, #ffe86a 0%, #f5c800 52%, #ad8500 100%);
  box-shadow:
    7px 8px 0 #8f6900,
    0 14px 26px rgba(0,0,0,0.42),
    inset -10px -12px 18px rgba(86,59,0,0.2);
}
.die.idle.ready-p2 {
  background:
    radial-gradient(circle at 28% 20%, rgba(255,255,255,0.54), rgba(255,255,255,0.12) 28%, transparent 44%),
    linear-gradient(145deg, #18864a 0%, #0f5f32 58%, #052916 100%);
  box-shadow:
    7px 8px 0 #042612,
    0 14px 26px rgba(0,0,0,0.44),
    inset -10px -12px 18px rgba(0,0,0,0.28);
}
.die { position: relative; overflow: visible; }
.die::before {
  content: '';
  position: absolute;
  inset: 11% -10% -12% 18%;
  border-radius: 21%;
  z-index: -1;
  transform: skewY(5deg);
  opacity: 0.92;
}
.die.p1::before { background: linear-gradient(135deg, #c59b00, #6f5200); }
.die.p2::before { background: linear-gradient(135deg, #083f20, #02180c); }
.die.idle::before { background: linear-gradient(135deg, #303637, #111); }
.die.idle.ready-p1::before { background: linear-gradient(135deg, #c59b00, #6f5200); }
.die.idle.ready-p2::before { background: linear-gradient(135deg, #083f20, #02180c); }
/* Oval gloss highlight */
.die::after {
  content: '';
  position: absolute;
  top: 7%; left: 9%;
  width: 58%; height: 36%;
  background: radial-gradient(ellipse at 38% 28%, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.15) 54%, transparent 100%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 3;
}
.die.rolling {
  animation: dieRoll 0.85s cubic-bezier(.16,.74,.25,1) both;
  transform-origin: 50% 50%;
}
.die.roll-resolved {
  animation: dieResolvePulse 0.42s cubic-bezier(.18,.9,.22,1) both;
  transform-origin: 50% 50%;
}
.die.trashed { animation: dieTrash 0.55s ease-in forwards; }
@keyframes dieRoll {
  0% {
    transform: perspective(540px) rotateX(-10deg) rotateY(10deg) rotateZ(0deg) scale(1);
    box-shadow: 8px 8px 0 0 rgba(0,0,0,0.42), 14px 14px 0 0 rgba(0,0,0,0.32), 0 12px 30px rgba(0,0,0,0.55), inset 0 0 0 1px rgba(255,255,255,0.16);
  }
  12% {
    transform: perspective(540px) rotateX(18deg) rotateY(-24deg) rotateZ(135deg) scale(1.04);
    box-shadow: 6px 10px 0 0 rgba(0,0,0,0.4), 12px 18px 0 0 rgba(0,0,0,0.24), 0 16px 30px rgba(0,0,0,0.48), inset 0 0 0 1px rgba(255,255,255,0.15);
  }
  24% {
    transform: perspective(540px) rotateX(-26deg) rotateY(30deg) rotateZ(285deg) scale(0.98);
  }
  38% {
    transform: perspective(540px) rotateX(24deg) rotateY(-18deg) rotateZ(475deg) scale(1.05);
  }
  52% {
    transform: perspective(540px) rotateX(-18deg) rotateY(28deg) rotateZ(650deg) scale(0.99);
  }
  66% {
    transform: perspective(540px) rotateX(16deg) rotateY(-22deg) rotateZ(810deg) scale(1.03);
  }
  82% {
    transform: perspective(540px) rotateX(-12deg) rotateY(16deg) rotateZ(1015deg) scale(1.01);
  }
  92% {
    transform: perspective(540px) rotateX(-10deg) rotateY(10deg) rotateZ(1072deg) scale(1.08,0.94);
  }
  100% {
    transform: perspective(540px) rotateX(-10deg) rotateY(10deg) rotateZ(1080deg) scale(1);
    box-shadow: 8px 8px 0 0 rgba(0,0,0,0.42), 14px 14px 0 0 rgba(0,0,0,0.32), 0 12px 30px rgba(0,0,0,0.55), inset 0 0 0 1px rgba(255,255,255,0.16);
  }
}
@keyframes dieResolvePulse {
  0% {
    transform: perspective(540px) rotateX(-10deg) rotateY(10deg) scale(1);
    filter: brightness(1);
  }
  28% {
    transform: perspective(540px) rotateX(-10deg) rotateY(10deg) scale(1.12,0.9) translateY(5px);
    filter: brightness(1.18);
  }
  58% {
    transform: perspective(540px) rotateX(-10deg) rotateY(10deg) scale(0.96,1.08) translateY(-3px);
    filter: brightness(1.24);
  }
  100% {
    transform: perspective(540px) rotateX(-10deg) rotateY(10deg) scale(1);
    filter: brightness(1);
  }
}
@keyframes dieTrash {
  0%   { transform: perspective(500px) rotateX(-10deg) rotateY(10deg) scale(1); opacity: 1; }
  30%  { transform: perspective(500px) rotateX(20deg) rotateY(-20deg) scale(1.1); opacity: 1; }
  100% { transform: perspective(500px) rotateX(60deg) rotateY(40deg) scale(0.15) translateY(30px); opacity: 0; }
}

.dot-cell {
  display: flex;
  align-items: center;
  justify-content: center;
}
.dot {
  width:  clamp(17px, 5vw, 24px);
  height: clamp(17px, 5vw, 24px);
  border-radius: 50%;
  background: var(--yellow-pip);
  box-shadow:
    inset 1.7px 1.7px 3.2px rgba(0,0,0,0.58),
    inset -1px -1px 2px rgba(255,255,255,0.1),
    0 1.2px 1px rgba(255,255,255,0.14);
}
.die.p2 .dot { background: var(--green-pip); }
.die.idle .dot { background: #555; }

/* ── ROLL BUTTON ── */
.roll-btn {
  position: absolute;
  inset: 0;
  z-index: 5;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  border-radius: clamp(16px, 4.5vw, 22px);
  background: transparent;
  color: #ff2424;
  font-family: 'Bangers', sans-serif;
  font-size: clamp(2.08rem, 8.9vw, 3.55rem);
  line-height: 0.85;
  letter-spacing: 0.02em;
  padding: 0 0 0.02em;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transform: rotate(-7deg);
  text-shadow:
    2px 2px 0 #760909,
    0 0 10px rgba(255,36,36,0.35);
  -webkit-text-stroke: 1px rgba(100,0,0,0.25);
  transition: opacity 0.18s ease, transform 0.1s ease, text-shadow 0.18s ease;
}
.die.idle + .roll-btn.p1:not(:disabled) {
  opacity: 1;
  pointer-events: auto;
  animation: rollInkPulse 1.25s ease-in-out infinite;
}
.roll-btn:disabled {
  opacity: 0;
  pointer-events: none;
  cursor: default;
  animation: none;
}
.roll-btn:active:not(:disabled) {
  transform: rotate(-7deg) scale(0.94);
}
.roll-btn:focus-visible {
  outline: 3px solid rgba(245,200,0,0.9);
  outline-offset: -6px;
}

/* ── ROLL BUTTON PULSE ── */
@keyframes rollInkPulse {
  0%,100% {
    opacity: 0.82;
    transform: rotate(-7deg) scale(0.96);
    text-shadow: 2px 2px 0 #760909, 0 0 8px rgba(255,36,36,0.25);
  }
  48% {
    opacity: 1;
    transform: rotate(-7deg) scale(1.08);
    text-shadow: 2px 2px 0 #760909, 0 0 23px rgba(255,36,36,0.82), 0 0 34px rgba(245,200,0,0.42);
  }
}

/* ── MESSAGE ── */
.message {
  min-height: 1.75rem;
  font-family: 'Bangers', 'Fredoka One', Arial Black, sans-serif;
  font-size: clamp(1rem, 3.3vw, 1.32rem);
  letter-spacing: 0.08em;
  text-align: center;
  padding: 0 0.5rem;
  color: #17361f;
  text-shadow: 0 1px 0 rgba(255,255,255,0.72);
  text-transform: uppercase;
}
.message.ok {
  color: var(--yellow);
  text-shadow: 2px 2px 0 var(--green), 0 2px 8px rgba(245,200,0,0.28);
}
.message.trash {
  color: var(--trash-red);
  text-shadow: 2px 2px 0 #6b0f0f, 0 2px 10px rgba(217,48,48,0.26);
}
.message.win {
  color: #f5c800;
  text-shadow: 2px 2px 0 #0f5f32, 0 2px 12px rgba(245,200,0,0.34);
}

/* ── ROUND FLASH ── */
.round-flash {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 5;
  opacity: 0;
}
.round-flash.p1 { animation: flashY 0.9s ease-out forwards; }
.round-flash.p2 { animation: flashG 0.9s ease-out forwards; }
@keyframes flashY {
  0%   { background: rgba(245,200,0,0);    opacity: 1; }
  20%  { background: rgba(245,200,0,0.28); }
  100% { background: rgba(245,200,0,0);    opacity: 0; }
}
@keyframes flashG {
  0%   { background: rgba(30,107,30,0);    opacity: 1; }
  20%  { background: rgba(30,107,30,0.32); }
  100% { background: rgba(30,107,30,0);    opacity: 0; }
}

/* ── SET CLAIM BADGE ── */
.claim-badge {
  position: fixed;
  z-index: 60;
  pointer-events: none;
  min-width: 138px;
  padding: 0.45rem 0.65rem 0.38rem;
  border-radius: 12px;
  text-align: center;
  transform: translate(-50%, -50%) scale(0.7) rotate(-4deg);
  opacity: 0;
  box-shadow: 0 8px 0 rgba(0,0,0,0.4), 0 18px 32px rgba(0,0,0,0.35);
  animation: claimPop 1.35s ease-out forwards;
}
.claim-badge.p1 {
  background: linear-gradient(180deg, #ffe84a 0%, #f5c800 100%);
  color: #1a5c1a;
  border: 3px solid #1a5c1a;
}
.claim-badge.p2 {
  background: linear-gradient(180deg, #37bd37 0%, #1e6b1e 100%);
  color: #f5c800;
  border: 3px solid #f5c800;
}
.claim-main {
  font-family: 'Bangers', sans-serif;
  font-size: clamp(1.4rem, 5vw, 2rem);
  letter-spacing: 0.1em;
  line-height: 0.95;
  text-shadow: 1px 1px 0 rgba(255,255,255,0.28);
}
.claim-sub {
  margin-top: 0.15rem;
  font-size: clamp(0.55rem, 2vw, 0.72rem);
  letter-spacing: 0.08em;
  opacity: 0.86;
}
@keyframes claimPop {
  0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.55) rotate(-8deg); }
  16%  { opacity: 1; transform: translate(-50%, -50%) scale(1.14) rotate(3deg); }
  34%  { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(-3deg); }
  78%  { opacity: 1; transform: translate(-50%, -68%) scale(1) rotate(-3deg); }
  100% { opacity: 0; transform: translate(-50%, -92%) scale(0.82) rotate(-3deg); }
}

/* ── BOARD SCENE ── */
.board-scene {
  --lid-offset: clamp(-88px, -16vw, -46px);
  --can-offset: clamp(124px, 27vw, 164px);
  position: relative;
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  width: 100%;
  padding: 1.05rem 0.5rem clamp(2.1rem, 6vw, 4.2rem);
  flex-shrink: 0;
  overflow: visible;
  cursor: none;
}
.board-scene * {
  cursor: none;
}
.board-scene.lid-weight-hit {
  animation: sceneLidWeight 0.38s cubic-bezier(.15,.82,.16,1);
}
.board-scene.can-weight-hit {
  animation: sceneCanWeight 0.52s cubic-bezier(.15,.82,.16,1);
}
@keyframes sceneLidWeight {
  0%,100% { transform: translate3d(0,0,0); }
  22% { transform: translate3d(0,3px,0); }
  48% { transform: translate3d(0,-1px,0); }
}
@keyframes sceneCanWeight {
  0%,100% { transform: translate3d(0,0,0); }
  16% { transform: translate3d(-3px,4px,0); }
  31% { transform: translate3d(4px,-2px,0); }
  48% { transform: translate3d(-2px,2px,0); }
  68% { transform: translate3d(1px,-1px,0); }
}
.board-blob {
  position: absolute;
  inset: 20% 9% 17%;
  background:
    radial-gradient(ellipse at 48% 50%, rgba(45,42,36,0.11) 0%, rgba(45,42,36,0.065) 46%, rgba(45,42,36,0.025) 70%, transparent 100%);
  border-radius: 50% / 42%;
  opacity: 0.72;
  z-index: 0;
  box-shadow: none;
}
.board-ring-text {
  position: absolute;
  display: none;
  /* centered on the board-wrap; sized relative to board */
  width:  clamp(276px, 74vw, 410px);
  height: clamp(276px, 74vw, 410px);
  z-index: 5;
  pointer-events: none;
  overflow: visible;
  left: calc(50% + var(--lid-offset)); top: 50%;
  transform: translate(-50%, -50%);
}
.board-wrap {
  z-index: 4;
  transform: translateX(var(--lid-offset));
  --lid-place-color: rgba(245,200,0,0.78);
  --lid-place-glow: rgba(245,200,0,0.68);
}
.board-wrap::before {
  content: '';
  position: absolute;
  left: 50%;
  bottom: 2%;
  width: 92%;
  height: 16%;
  border-radius: 50%;
  background: radial-gradient(ellipse at center, rgba(42,38,31,0.36) 0%, rgba(42,38,31,0.18) 48%, transparent 78%);
  transform: translateX(-50%);
  z-index: -1;
  pointer-events: none;
}
.board-wrap.lid-win-pulse {
  z-index: 85;
  animation: lidWinPulse 0.92s cubic-bezier(.13,.85,.16,1);
}
.board-wrap::after {
  content: '';
  position: absolute;
  inset: -9%;
  border-radius: 50%;
  border: clamp(3px, 1vw, 6px) solid var(--lid-place-color);
  opacity: 0;
  pointer-events: none;
  filter:
    drop-shadow(0 0 15px var(--lid-place-glow))
    drop-shadow(0 15px 12px rgba(0,0,0,0.24));
}
.board-wrap.lid-place-pulse {
  animation: lidPlaceBump 0.82s cubic-bezier(.15,.88,.16,1);
}
.board-wrap.lid-place-pulse::after {
  animation: lidPlaceRing 1s cubic-bezier(.12,.82,.18,1);
}
.board-wrap.game-win-spin {
  z-index: 120;
  animation: boardGameWinSpin 2.45s cubic-bezier(.09,.82,.12,1);
}
.lid-edge-glint,
.lid-inner-glint {
  pointer-events: none;
  fill: none;
  opacity: 0;
  stroke-linecap: round;
  transform-box: fill-box;
  transform-origin: center;
  mix-blend-mode: screen;
}
.lid-edge-glint {
  stroke: url(#lidGlintG);
  stroke-width: 4.2;
  stroke-dasharray: 34 612;
  stroke-dashoffset: 0;
  filter: url(#lidGlintGlow);
  animation: lidHeroGlint 6.4s cubic-bezier(.16,.82,.18,1) 0.7s infinite;
}
.lid-inner-glint {
  stroke: rgba(255,255,255,0.68);
  stroke-width: 1.3;
  stroke-dasharray: 18 520;
  filter: url(#lidGlintGlow);
  animation: lidInnerGlint 6.4s cubic-bezier(.16,.82,.18,1) 0.78s infinite;
}
@keyframes lidHeroGlint {
  0%, 7%, 31%, 100% {
    opacity: 0;
    stroke-dashoffset: 0;
    transform: rotate(-44deg);
  }
  11% {
    opacity: 0.88;
    stroke-dashoffset: -26;
    transform: rotate(-14deg);
  }
  19% {
    opacity: 0.98;
    stroke-dashoffset: -104;
    transform: rotate(48deg);
  }
  27% {
    opacity: 0;
    stroke-dashoffset: -176;
    transform: rotate(104deg);
  }
}
@keyframes lidInnerGlint {
  0%, 10%, 28%, 100% {
    opacity: 0;
    stroke-dashoffset: 0;
    transform: rotate(-26deg);
  }
  15% {
    opacity: 0.42;
    stroke-dashoffset: -42;
    transform: rotate(16deg);
  }
  23% {
    opacity: 0;
    stroke-dashoffset: -126;
    transform: rotate(76deg);
  }
}
@keyframes lidPlaceBump {
  0%,100% { transform: translateX(var(--lid-offset)) translateY(0) scale(1); filter: drop-shadow(0 5px 9px rgba(0,0,0,0.42)); }
  15% { transform: translateX(var(--lid-offset)) translateY(6px) scale(0.952); filter: drop-shadow(0 15px 8px rgba(0,0,0,0.48)); }
  38% { transform: translateX(var(--lid-offset)) translateY(-5px) scale(1.105); filter: drop-shadow(0 0 28px var(--lid-place-glow)); }
  62% { transform: translateX(var(--lid-offset)) translateY(2px) scale(0.982); filter: drop-shadow(0 9px 10px rgba(0,0,0,0.36)); }
  82% { transform: translateX(var(--lid-offset)) translateY(-1px) scale(1.018); }
}
@keyframes lidPlaceRing {
  0% { opacity: 0.94; transform: scale(0.68); }
  34% { opacity: 0.72; transform: scale(1.05); }
  68% { opacity: 0.34; transform: scale(1.3); }
  100% { opacity: 0; transform: scale(1.52); }
}
.lid-place-burst {
  position: fixed;
  left: var(--burst-x);
  top: var(--burst-y);
  width: clamp(126px, 22vw, 210px);
  height: clamp(62px, 11vw, 106px);
  z-index: 96;
  pointer-events: none;
  border-radius: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  background:
    radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.62) 0 9%, var(--burst-color) 10% 18%, transparent 20%),
    radial-gradient(ellipse at 50% 50%, var(--burst-glow) 0 34%, transparent 68%);
  filter:
    drop-shadow(0 6px 10px rgba(0,0,0,0.22))
    drop-shadow(0 0 22px var(--burst-glow));
  animation: lidPlaceBurst 0.96s cubic-bezier(.12,.84,.12,1) forwards;
}
.lid-place-burst::before {
  content: '';
  position: absolute;
  inset: 30% 12%;
  border-radius: 50%;
  background: radial-gradient(ellipse at center, rgba(255,255,255,0.68) 0 11%, var(--burst-color) 12% 23%, transparent 25%);
  opacity: 0.7;
  transform: scaleX(1.35);
}
.lid-place-burst::after {
  content: '';
  position: absolute;
  inset: 8%;
  border: clamp(3px, 0.7vw, 5px) solid var(--burst-color);
  border-radius: 50%;
  opacity: 0.78;
}
@keyframes lidPlaceBurst {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.42) rotate(-4deg); }
  18% { opacity: 1; transform: translate(-50%, -50%) scale(0.92) rotate(2deg); }
  48% { opacity: 0.76; transform: translate(-50%, -50%) scale(1.42) rotate(4deg); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(2.12) rotate(6deg); }
}
@keyframes lidWinPulse {
  0%,100% {
    transform: translateX(var(--lid-offset)) scale(1);
    filter: drop-shadow(0 6px 12px rgba(0,0,0,0.58));
  }
  18% {
    transform: translateX(var(--lid-offset)) scale(1.72) rotate(-4deg);
    filter: drop-shadow(0 0 36px rgba(245,200,0,0.95));
  }
  42% {
    transform: translateX(var(--lid-offset)) scale(1.18) rotate(3deg);
    filter: drop-shadow(0 0 26px rgba(94,232,94,0.72));
  }
  66% {
    transform: translateX(var(--lid-offset)) scale(1.34) rotate(-1deg);
    filter: drop-shadow(0 0 18px rgba(255,255,255,0.6));
  }
}
@keyframes boardGameWinSpin {
  0% {
    transform: translateX(var(--lid-offset)) rotate(0deg) scale(1);
    filter: drop-shadow(0 6px 12px rgba(0,0,0,0.58));
  }
  16% {
    transform: translateX(var(--lid-offset)) rotate(126deg) scale(1.38);
    filter: drop-shadow(0 0 42px rgba(245,200,0,0.96));
  }
  38% {
    transform: translateX(var(--lid-offset)) rotate(360deg) scale(1.08);
    filter: drop-shadow(0 0 34px rgba(94,232,94,0.82));
  }
  64% {
    transform: translateX(var(--lid-offset)) rotate(612deg) scale(1.46);
    filter: drop-shadow(0 0 48px rgba(255,255,255,0.74));
  }
  100% {
    transform: translateX(var(--lid-offset)) rotate(720deg) scale(1);
    filter: drop-shadow(0 6px 12px rgba(0,0,0,0.58));
  }
}

/* ── SHARED TRASH CAN ── */
.trash-can {
  position: absolute;
  left: calc(50% + var(--can-offset));
  top: calc(50% + clamp(18px, 4vw, 32px));
  width: clamp(114px, 24.5vw, 160px);
  height: clamp(180px, 40vw, 264px);
  z-index: 2;
  pointer-events: none;
  transform: translate(-50%, -50%);
  transform-origin: 50% 46%;
  filter:
    drop-shadow(0 10px 12px rgba(0,0,0,0.48))
    drop-shadow(0 18px 18px rgba(52,43,32,0.14));
  --can-feed-scale: 3;
  --can-feed-glow: 34px;
  --can-feed-duration: 720ms;
}
.trash-can::before {
  content: '';
  position: absolute;
  left: 50%;
  bottom: 3%;
  width: 92%;
  height: 16%;
  border-radius: 50%;
  background: radial-gradient(ellipse at center, rgba(42,38,31,0.36) 0%, rgba(42,38,31,0.18) 46%, transparent 78%);
  transform: translateX(-50%);
  z-index: -1;
  pointer-events: none;
}
.trash-can svg {
  width: 100%;
  height: 100%;
  overflow: visible;
  transform: perspective(520px) rotateY(-4deg);
  transform-origin: 50% 54%;
  animation: canSlowTurntable 7.8s ease-in-out infinite;
  will-change: transform;
}
body.fast-preview .trash-can svg {
  animation: none;
  will-change: auto;
}
body.fast-preview .title-hero-glint,
body.fast-preview .can-hero-glint,
body.fast-preview .can-rim-glint {
  animation: none;
  opacity: 0;
}
body.fast-preview .lid-edge-glint,
body.fast-preview .lid-inner-glint,
body.fast-preview .roll-btn,
body.fast-preview .start-btn {
  animation: none !important;
}
.can-hero-glint,
.can-rim-glint {
  pointer-events: none;
  opacity: 0;
  mix-blend-mode: screen;
}
.can-hero-glint {
  transform-box: fill-box;
  transform-origin: center;
  animation: canHeroGlintSweep 6.8s cubic-bezier(.16,.82,.18,1) 1.2s infinite;
}
.can-rim-glint {
  fill: none;
  stroke-linecap: round;
  stroke-dasharray: 20 152;
  stroke-dashoffset: 0;
  animation: canRimGlintSweep 6.8s cubic-bezier(.16,.82,.18,1) 1.28s infinite;
}
.trash-can::after {
  content: '';
  position: absolute;
  inset: -12%;
  border-radius: 50%;

      rotateY(calc(var(--ry, -12deg) - 52deg))

<script>
(function () {

  // ── MINI DIE PIP POSITIONS ([top%, left%]) ───────────────────
  const MINI_DOTS = [
    [],
    [[50,50]],
    [[25,75],[75,25]],
    [[25,75],[50,50],[75,25]],
    [[25,25],[25,75],[75,25],[75,75]],
    [[25,25],[25,75],[50,50],[75,25],[75,75]],
    [[25,25],[25,75],[50,25],[50,75],[75,25],[75,75]],
  ];

  // ── DOT PATTERNS (3×3 grid, [row,col]) ──────────────────────
  const DOTS = [
    [],
    [[1,1]],
    [[0,2],[2,0]],
    [[0,2],[1,1],[2,0]],
    [[0,0],[0,2],[2,0],[2,2]],
    [[0,0],[0,2],[1,1],[2,0],[2,2]],
    [[0,0],[0,2],[1,0],[1,2],[2,0],[2,2]],
  ];

  // ── STATE ────────────────────────────────────────────────────
  let board;       // null | { player, color }, length 6, index = face-1
  let pools;       // { p1:{yellow,green}, p2:{yellow,green} }
  let poolFaces;   // stable visible pip faces for inventory dice
  let trashed;     // {p1, p2}
  let trashDice;   // dice currently visible inside the can this round
  let current;     // 'p1' | 'p2'
  let round;
  let busy;
  let totalRolls;
  let gameStarted;

  const COLORS = ['yellow', 'green'];
  const COLOR_CLASS = { yellow: 'p1', green: 'p2' };
  const PLAYER_NAME = { p1: 'Yellow', p2: 'Green' };
  const URL_OPTIONS = new URLSearchParams(window.location.search);
  const URL_HASH = window.location.hash.toLowerCase();
  const LOCAL_PREVIEW = ['127.0.0.1', 'localhost', '::1'].includes(window.location.hostname);
  const QA_ENABLED = URL_OPTIONS.has('qa') || URL_HASH.includes('qa');
  const P0_START_ENABLED = URL_OPTIONS.has('p0') || URL_OPTIONS.has('p-0') || URL_OPTIONS.has('debug-p0') || URL_HASH.includes('p0') || URL_HASH.includes('p-0');
  const FULL_FX_ENABLED = URL_OPTIONS.has('fullfx') || URL_HASH.includes('fullfx');
  const FORCE_QA_ENABLED = FULL_FX_ENABLED || URL_OPTIONS.has('forceqa') || URL_HASH.includes('forceqa');
  const FAST_PREVIEW_ENABLED = !FULL_FX_ENABLED && (LOCAL_PREVIEW || QA_ENABLED || P0_START_ENABLED || URL_OPTIONS.has('fast') || URL_OPTIONS.has('iter') || URL_OPTIONS.has('lite') || URL_HASH.includes('fast') || URL_HASH.includes('iter') || URL_HASH.includes('lite'));
  document.body.classList.toggle('fast-preview', FAST_PREVIEW_ENABLED);
  const ROLL_ANIMATION_MS = FAST_PREVIEW_ENABLED ? 420 : 850;
  const ROLL_REVEAL_HOLD_MS = FAST_PREVIEW_ENABLED ? 280 : 650;
  const TURN_HANDOFF_MS = FAST_PREVIEW_ENABLED ? 340 : 950;
  const CPU_START_MS = FAST_PREVIEW_ENABLED ? 180 : 650;
  const P0_AUTOPLAY_MS = FAST_PREVIEW_ENABLED ? 170 : 720;
  let forcedRolls = [];
  let p0Autoplay = false;
  let p0Timer = null;
  let victoryRainFrame = null;
  let victoryRainRun = 0;
  const runtimeTimers = new Set();

  function runLater(callback, delay) {
    const id = window.setTimeout(() => {
      runtimeTimers.delete(id);
      callback();
    }, delay);
    runtimeTimers.add(id);
    return id;
  }

  function cancelRuntimeTimer(id) {
    if (!id) return;
    clearTimeout(id);
    runtimeTimers.delete(id);
  }

  function clearRuntimeTimers() {
    runtimeTimers.forEach(id => clearTimeout(id));
    runtimeTimers.clear();
    p0Timer = null;
  }

  function totalDice(player) {
    return COLORS.reduce((sum, color) => sum + pools[player][color], 0);
  }

  function totalTrashedDice() {
    return Array.isArray(trashDice) ? trashDice.length : (trashed.p1 + trashed.p2);
  }

  function chooseDieColor(player) {
    let pick = Math.floor(Math.random() * totalDice(player)) + 1;
    for (const color of COLORS) {
      pick -= pools[player][color];
      if (pick <= 0) return color;
    }
    return null;
  }

  function takeDie(player) {
    const color = chooseDieColor(player);
    if (!color) return null;
    pools[player][color]--;
    takePoolFace(player, color);
    return color;
  }

  function colorClass(color) {
    return COLOR_CLASS[color] || 'p1';
  }

  function playerScoreColor(player) {
    return player === 'p2' ? 'green' : 'yellow';
  }

  function slotColors(color) {
    return color === 'yellow'
      ? { fill: '#f5c800', hi: '#ffe86a', low: '#b78c00', stroke: '#987300', label: '#1a5c1a', side: '#8f6900' }
      : { fill: '#0f5f32', hi: '#1d8b50', low: '#052d18', stroke: '#06361c', label: '#f5c800', side: '#032112' };
  }

  function paintSlot(idx, die) {
    const colors = slotColors(die.color);
    const slot = slotEls[idx];
    const label = labelEls[idx];
    slot.setAttribute('fill', '#737b7d');
    slot.setAttribute('stroke', '#b9c0c0');
    label.setAttribute('fill', 'rgba(45,50,51,0.18)');

    if (slotDiceEls[idx]) slotDiceEls[idx].remove();
    const info = slotInfo[idx];
    const svg = boardWrap.querySelector('svg.lid-svg');
    if (!svg || !info) return;

    const NS = 'http://www.w3.org/2000/svg';
    const g = document.createElementNS(NS, 'g');

  // ── POOL VISUAL — stable mini dice faces ───────────────────
  function seededPoolFace(player, color, index) {
    const offset = player === 'p1'
      ? (color === 'yellow' ? 0 : 2)
      : (color === 'green' ? 3 : 5);
    return ((index * 5 + offset) % 6) + 1;
  }

  function resetPoolFaces() {
    poolFaces = { p1: { yellow: [], green: [] }, p2: { yellow: [], green: [] } };
    ['p1', 'p2'].forEach(player => {
      COLORS.forEach(color => {
        for (let i = 0; i < pools[player][color]; i++) {
          poolFaces[player][color].push(seededPoolFace(player, color, i));
        }
      });
    });
  }

  function ensurePoolFaces(player, color) {
    if (!poolFaces) resetPoolFaces();
    const faces = poolFaces[player][color];
    const target = pools[player][color];
    while (faces.length > target) faces.pop();
    while (faces.length < target) faces.push(seededPoolFace(player, color, faces.length));
    return faces;
  }

  function takePoolFace(player, color) {
    const faces = ensurePoolFaces(player, color);
    if (faces.length === 0) return null;
    return faces.pop();
  }

  function addPoolFace(player, die) {
    const color = die.color;
    const value = clamp(Math.floor(die.value || seededPoolFace(player, color, pools[player][color] - 1)), 1, 6);
    poolFaces[player][color].push(value);
    return value;
  }

  function updatePoolVisual(player) {
    const el = player === 'p1' ? p1Pile : p2Pile;
    el.innerHTML = '';
    COLORS.forEach(color => {
      const faces = ensurePoolFaces(player, color);
      faces.forEach(value => el.appendChild(makeMiniDie(color, value)));
    });
  }

  function makeMiniDie(color, value, extraClass = '') {
    const d = document.createElement('div');
    d.className = 'mini-die ' + colorClass(color) + (extraClass ? ' ' + extraClass : '');
    (MINI_DOTS[value] || []).forEach(([top, left]) => {
      const pip = document.createElement('div');
      pip.className = 'mini-pip';
      pip.style.top  = top  + '%';
      pip.style.left = left + '%';
      d.appendChild(pip);
    });
    return d;
  }

  function renderPoolCounts() {
    p1PoolEl.textContent = totalDice('p1');
    p2PoolEl.textContent = totalDice('p2');
  }

  function pulsePoolCount(player) {
    const el = player === 'p1' ? p1PoolEl : p2PoolEl;
    el.classList.remove('payout-tick');
    void el.offsetWidth;
    el.classList.add('payout-tick');
    el.addEventListener('animationend', () => el.classList.remove('payout-tick'), { once: true });
  }

  function appendPoolDieVisual(player, die) {
    const pileEl = player === 'p1' ? p1Pile : p2Pile;
    const value = addPoolFace(player, die);
    pileEl.appendChild(makeMiniDie(die.color, value));
  }

      [28, 24, 10, 0.92], [73, 21, -19, 0.92], [41, 8, -11, 1.0],
      [62, 5, 17, 1.0], [51, -7, 6, 1.08], [33, -5, -18, 0.9],
      [70, -6, 14, 0.9], [44, -17, 20, 0.88], [58, -19, -14, 0.88]
    ];
    const visible = trashDice.slice(-slots.length);
    visible.forEach((die, i) => {
      const [left, top, rot, scale] = slots[i];
      const value = clamp(Math.floor(die.value || ((i % 6) + 1)), 1, 6);
      const el = makeMiniDie(die.color, value, 'can-load-die');
      el.style.left = left + '%';
      el.style.top = top + '%';
      el.style.setProperty('--r', rot + 'deg');
      el.style.setProperty('--s', scale.toFixed(2));
      el.style.setProperty('--z', String(i + 1));
      canLoadPile.appendChild(el);
    });
  }

  // ── AUDIO ENGINE ─────────────────────────────────────────────
  const Audio = (() => {
    let ctx = null;
    function getCtx() {
      if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
      return ctx;
    }
    function tone(freq, type, gain, start, dur, dest) {
      const c = getCtx();
      const osc = c.createOscillator();
      const g   = c.createGain();
      osc.type = type; osc.frequency.value = freq;
      g.gain.setValueAtTime(0.001, c.currentTime + start);
      g.gain.linearRampToValueAtTime(gain, c.currentTime + start + 0.03);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + start + dur);
      osc.connect(g).connect(dest || c.destination);
      osc.start(c.currentTime + start);
      osc.stop(c.currentTime + start + dur + 0.05);
    }
    function noiseBurst(duration, start, gain, decay = 1.6, filterFreq = 1200, filterType = 'bandpass') {
      const c = getCtx();
      const frames = Math.max(1, Math.floor(c.sampleRate * duration));
      const buf = c.createBuffer(1, frames, c.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, decay);
      }
      const src = c.createBufferSource();
      const filter = c.createBiquadFilter();
      const g = c.createGain();
      src.buffer = buf;
      filter.type = filterType;
      filter.frequency.value = filterFreq;
      filter.Q.value = 1.8;
      g.gain.value = gain;
      src.connect(filter).connect(g).connect(c.destination);
      src.start(c.currentTime + start);
      src.stop(c.currentTime + start + duration + 0.03);
    }
    return {
      rollLoop(durationMs = 1550) {
        const c = getCtx();
        const total = Math.max(0.25, durationMs / 1000);
        for (let t = 0.01; t < total - 0.08; t += 0.045 + Math.random() * 0.045) {
          const progress = t / total;
          const fade = 1 - progress * 0.38;
          const heavy = Math.random() > 0.68;
          noiseBurst(0.024 + Math.random() * 0.02, t, (heavy ? 0.075 : 0.052) * fade, 2.1, 1050 + Math.random() * 1700, 'bandpass');
          noiseBurst(0.018 + Math.random() * 0.014, t + 0.006, 0.032 * fade, 2.7, 3200 + Math.random() * 2200, 'highpass');
          tone(150 + Math.random() * 190, Math.random() > 0.5 ? 'triangle' : 'square', (heavy ? 0.032 : 0.02) * fade, t, 0.038, c.destination);
          if (heavy) tone(70 + Math.random() * 34, 'sine', 0.055 * fade, t, 0.08, c.destination);
        }
        noiseBurst(0.07, Math.max(0.04, total - 0.18), 0.075, 2.4, 1800, 'bandpass');
        tone(84, 'sine', 0.07, Math.max(0.02, total - 0.16), 0.14, c.destination);
      },
      rollResolve(value = 1) {
        const c = getCtx();
        const notes = [523, 587, 659, 698, 784, 880];
        const root = notes[clamp(value, 1, 6) - 1] || 659;
        noiseBurst(0.035, 0.0, 0.045, 2.8, 2600, 'highpass');
        tone(root, 'triangle', 0.065, 0.0, 0.11, c.destination);
        tone(root * 1.5, 'sine', 0.045, 0.055, 0.14, c.destination);
        tone(root * 2, 'sine', 0.03, 0.115, 0.16, c.destination);
      },
      lidWinFanfare() {
        const c = getCtx();
        noiseBurst(0.12, 0.0, 0.16, 1.8, 2300, 'highpass');
        [[392,0.00],[523,0.06],[659,0.12],[784,0.20],[1047,0.30]].forEach(([fr,t]) => {
          tone(fr, 'triangle', 0.18, t, 0.28, c.destination);
          tone(fr * 0.5, 'sine', 0.08, t, 0.32, c.destination);
        });
        tone(98, 'sine', 0.34, 0.0, 0.55, c.destination);
        tone(1568, 'sine', 0.06, 0.34, 0.24, c.destination);
      },
      placeClink() {
        const c = getCtx();
        noiseBurst(0.06, 0.0, 0.12, 2.6, 2600, 'highpass');
        noiseBurst(0.075, 0.012, 0.055, 2.2, 1180, 'bandpass');
        tone(1320, 'sine', 0.16, 0.0, 0.15, c.destination);
        tone(1760, 'triangle', 0.11, 0.025, 0.13, c.destination);
        tone(2348, 'sine', 0.045, 0.075, 0.16, c.destination);
        tone(246, 'sine', 0.075, 0.0, 0.12, c.destination);
      },
      placeFanfare(color = 'yellow') {
        const c = getCtx();
        const root = color === 'green' ? 392 : 523;
        noiseBurst(0.095, 0.0, 0.13, 2.1, 2850, 'highpass');
        noiseBurst(0.11, 0.055, 0.07, 2.7, 3800, 'highpass');
        [[root,0.00],[root * 1.25,0.052],[root * 1.5,0.105],[root * 2,0.18],[root * 2.5,0.29]].forEach(([fr,t], i) => {
          tone(fr, i < 3 ? 'triangle' : 'sine', 0.18 - i * 0.018, t, 0.23, c.destination);
          tone(fr * 0.5, 'sine', 0.07, t, 0.3, c.destination);
        });
        tone(root * 0.75, 'triangle', 0.085, 0.14, 0.34, c.destination);
        tone(root * 1.875, 'sine', 0.045, 0.36, 0.28, c.destination);
        tone(104, 'sine', 0.24, 0.0, 0.34, c.destination);
        tone(156, 'sine', 0.12, 0.12, 0.26, c.destination);
      },
      trashCrash(intensity = 1) {
        const c = getCtx();
        const now = c.currentTime;
        const power = clamp(1 + Math.max(0, intensity - 1) * 0.13, 1, 2.35);
        const fanfareGain = clamp(0.10 + intensity * 0.02, 0.12, 0.38);
        const bitePitch = clamp(1 + intensity * 0.018, 1.02, 1.34);

        // Heavy rock-into-can impact: sub slam first, then metallic shell ring.
        const thud = c.createOscillator();
        const thudGain = c.createGain();
        thud.type = 'sine';
        thud.frequency.setValueAtTime(88, now);
        thud.frequency.exponentialRampToValueAtTime(30, now + 0.34);
        thudGain.gain.setValueAtTime(0.001, now);
        thudGain.gain.linearRampToValueAtTime(0.92 * power, now + 0.018);
        thudGain.gain.exponentialRampToValueAtTime(0.001, now + 0.62);
        thud.connect(thudGain).connect(c.destination);
        thud.start(now);
        thud.stop(now + 0.66);

        noiseBurst(0.64, 0.0, 0.62 * power, 0.52, 520, 'bandpass');
        noiseBurst(0.26, 0.015, 0.40 * power, 0.72, 2450, 'highpass');
        noiseBurst(0.20, 0.12, 0.28 * power, 0.95, 1450, 'bandpass');
        noiseBurst(0.16, 0.26, 0.20 * power, 1.15, 3300, 'highpass');

        [[196,0.00,0.34,0.30],[247,0.03,0.42,0.23],[311,0.06,0.36,0.18],[415,0.11,0.32,0.14],[622,0.18,0.24,0.10]].forEach(([fr,t,dur,gain]) => {
          tone(fr, 'sawtooth', gain * power, t, dur, c.destination);
          tone(fr * 1.01, 'triangle', gain * 0.5 * power, t + 0.018, dur + 0.08, c.destination);
        });

        [[94,0.09,0.24],[71,0.28,0.28],[53,0.46,0.34]].forEach(([fr,t,dur]) => {
          tone(fr, 'sine', 0.32 * power, t, dur, c.destination);
        });

        [[980,0.03],[1220,0.16],[760,0.31]].forEach(([fr,t]) => {
          tone(fr, 'square', 0.08 * power, t, 0.07, c.destination);
        });

        // Hungry-can victory stab for each eaten die; it gets meaner as the can fills.
        [[220,0.00],[294,0.055],[392,0.11],[523,0.18]].forEach(([fr,t], i) => {
          tone(fr * bitePitch, 'sawtooth', fanfareGain * (1 - i * 0.12), t, 0.18, c.destination);
          tone(fr * 0.5, 'square', fanfareGain * 0.48, t + 0.018, 0.22, c.destination);
        });
        if (intensity >= 4) noiseBurst(0.22, 0.36, 0.22 * power, 1.05, 980, 'bandpass');
        if (intensity >= 8) tone(1568, 'triangle', 0.08 * power, 0.40, 0.18, c.destination);
      },
      // Punchy start-game fanfare — ascending brass stab
      startFanfare() {
        const c = getCtx();
        // Snare hit
        const buf = c.createBuffer(1, c.sampleRate * 0.15, c.sampleRate);
        const d   = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 3);
        const snare = c.createBufferSource(); snare.buffer = buf;
        const sg = c.createGain(); sg.gain.value = 0.25;
        snare.connect(sg).connect(c.destination); snare.start(c.currentTime + 0.05);
        // Ascending brass hits
        [[196, 0.0], [247, 0.1], [294, 0.2], [392, 0.3], [523, 0.4]].forEach(([fr, t]) => {
          tone(fr, 'sawtooth', 0.18, t, 0.28, c.destination);
          tone(fr * 1.5, 'square', 0.06, t, 0.22, c.destination);
        });
        // Bass thud
        tone(65, 'sine', 0.35, 0.0, 0.5, c.destination);
        tone(98, 'sine', 0.18, 0.4, 0.4, c.destination);
      },
      // Round start — sharp 3-note "ready" sting
      roundFanfare() {
        const c = getCtx();
        [[330, 0.0], [392, 0.12], [523, 0.24]].forEach(([fr, t]) => {
          tone(fr, 'triangle', 0.2, t, 0.28, c.destination);
        });
        tone(130, 'sine', 0.22, 0.0, 0.35, c.destination);
      },
      // Place tone — 3x punchy hit
      placeTone() {
        const c = getCtx();
        // Snare crack
        const buf = c.createBuffer(1, Math.floor(c.sampleRate * 0.09), c.sampleRate);
        const bd  = buf.getChannelData(0);
        for (let i = 0; i < bd.length; i++) bd[i] = (Math.random()*2-1) * Math.pow(1-i/bd.length, 2.2);
        const sn = c.createBufferSource(); sn.buffer = buf;
        const sg = c.createGain(); sg.gain.value = 0.28;
        sn.connect(sg).connect(c.destination); sn.start(c.currentTime);
        // 3-note ascending punch
        [[523,0.0,0.30],[659,0.10,0.28],[784,0.20,0.32]].forEach(([fr,t,dur]) => {
          tone(fr, 'triangle', 0.24, t, dur, c.destination);
          tone(fr*0.5, 'sine',   0.10, t, dur+0.1, c.destination);
        });
        // Bass thud
        tone(130, 'sine', 0.32, 0.0, 0.4, c.destination);
      },
      // Round WON — 20x massive fanfare
      roundWonFanfare(durationMs = 1700) {
        const c = getCtx(); const now = c.currentTime;
        const total = clamp(durationMs / 1000, 1.2, 3.8);
        function snareHit(t, vol) {
          const buf = c.createBuffer(1, Math.floor(c.sampleRate*0.14), c.sampleRate);
          const d = buf.getChannelData(0);
          for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.6);

        snareHit(Math.min(0.22, total * 0.18), 0.32);
        snareHit(Math.min(0.44, total * 0.32), 0.42);
        // 7-note full ascending run — triangle + sine harmonic each
        [[262,0.0],[330,0.10],[392,0.20],[523,0.31],[659,0.42],[784,0.53],[1047,0.65]].forEach(([fr,t]) => {

        tone(98,  'sine', 0.35, 0.44, Math.min(0.85, total * 0.45), c.destination);

        [523,659,784,1047].forEach(fr => tone(fr,'sine',0.13,0.65,Math.max(0.65, total - 0.75),c.destination));

        for (let t = 0.7; t < total - 0.08; t += 0.24) {
          tone(1760 + Math.random() * 520, 'sine', 0.035, t, 0.16, c.destination);

      winFanfare() {
        const c = getCtx();
        [[262, 0.0],[330, 0.08],[392, 0.16],[523, 0.25],[659, 0.35],[784, 0.45]].forEach(([fr, t]) => {
          tone(fr, 'triangle', 0.18, t, 0.5, c.destination);
        });
        tone(131, 'sine', 0.3, 0.0, 0.8, c.destination);

          const d = buf.getChannelData(0);
          for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 1.2);
          const src = c.createBufferSource();
          const g = c.createGain();
          src.buffer = buf;
          g.gain.value = gain;
          src.connect(g).connect(c.destination);
          src.start(now + t);

        [0, 0.13, 0.26, 0.54, 0.72, 0.9].forEach((t, i) => burstSnare(t, i < 3 ? 0.34 : 0.26));

        noiseBurst(0.9, 0.30, 0.22, 1.8, 1200, 'bandpass');
        [[196,0.00],[247,0.08],[294,0.16],[392,0.25],[523,0.36],[659,0.48],[784,0.60],[1047,0.74],[1319,0.92]].forEach(([fr,t], i) => {
          tone(fr, 'triangle', 0.24 - i * 0.012, t, 0.62, c.destination);
          tone(fr * 1.5, 'sine', 0.07, t + 0.025, 0.42, c.destination);
        });
        [[65,0.0,1.25,0.52],[98,0.34,1.05,0.38],[131,0.72,0.9,0.30]].forEach(([fr,t,dur,gain]) => {
          tone(fr, 'sine', gain, t, dur, c.destination);
        });
        [[523,1.05],[659,1.05],[784,1.05],[1047,1.05],[1319,1.05]].forEach(([fr,t]) => {
          tone(fr, 'sine', 0.11, t, 1.35, c.destination);
        });
        [1.28, 1.55, 1.82].forEach(t => noiseBurst(0.16, t, 0.11, 2.6, 4200, 'highpass'));
      },
      // Trash fanfare — big dramatic womp + crash
      trashSting() {
        const c = getCtx();
        const now = c.currentTime;
        // Crash noise burst
        const buf = c.createBuffer(1, Math.floor(c.sampleRate * 0.35), c.sampleRate);
        const bd  = buf.getChannelData(0);

  // ── DIE RENDERING ────────────────────────────────────────────
  function renderDie(value, player, color) {
    const el = getDie(player);
    el.className = 'die ' + colorClass(color || (player === 'p1' ? 'yellow' : 'green'));
    el.innerHTML = '';
    for (let r = 0; r < 3; r++) {
      for (let c = 0; c < 3; c++) {
        const cell = document.createElement('div');
        cell.className = 'dot-cell';
        const hasDot = (DOTS[value] || []).some(([dr,dc]) => dr===r && dc===c);
        if (hasDot) {
          const dot = document.createElement('div');
          dot.className = 'dot';
          cell.appendChild(dot);
        }
        el.appendChild(cell);
      }
    }
  }

  // Update pips only — does NOT reset class/animation
  function setPips(value, player) {
    const el = getDie(player);
    el.innerHTML = '';
    for (let row = 0; row < 3; row++) {
      for (let col = 0; col < 3; col++) {
        const cell = document.createElement('div');
        cell.className = 'dot-cell';
        if ((DOTS[value] || []).some(([dr,dc]) => dr===row && dc===col)) {
          const dot = document.createElement('div');
          dot.className = 'dot';
          cell.appendChild(dot);
        }
        el.appendChild(cell);
      }
    }
  }

  function clearDie(player) {
    const targets = player
      ? [{ el: getDie(player), player }]
      : [{ el: p1Die, player: 'p1' }, { el: p2Die, player: 'p2' }];
    targets.forEach(target => {
      target.el.className = `die idle ready-${target.player}`;
      target.el.style.opacity = '';
      target.el.innerHTML = Array(9).fill('<div class="dot-cell"></div>').join('');
    });
  }

  function makeDieClone(player, color) {
    const source = getDie(player);
    const r = source.getBoundingClientRect();
    const clone = source.cloneNode(true);
    clone.removeAttribute('id');
    clone.className = 'die ' + colorClass(color) + ' travelling-die';
    clone.style.left = r.left + 'px';
    clone.style.top = r.top + 'px';
    clone.style.width = r.width + 'px';
    clone.style.height = r.height + 'px';
    clone.style.transform = 'rotate(0deg) scale(1)';
    document.body.appendChild(clone);
    source.style.opacity = '0';
    return { clone, source, rect: r };
  }

  function travelRolledDieToSlot(player, color, idx, done) {
    const { clone, source, rect } = makeDieClone(player, color);
    const target = slotEls[idx].getBoundingClientRect();
    const size = Math.max(26, Math.min(rect.width * 0.62, target.width * 0.42));
    const startCx = rect.left + rect.width / 2;
    const startCy = rect.top + rect.height / 2;
    const endCx = target.left + target.width / 2;
    const endCy = target.top + target.height / 2;
    const dx = endCx - startCx;
    const dy = endCy - startCy;
    const arc = clamp(Math.abs(dx) * 0.12 + Math.abs(dy) * 0.18, 44, 130);
    clone.style.setProperty('--tx', dx.toFixed(1) + 'px');
    clone.style.setProperty('--ty', dy.toFixed(1) + 'px');
    clone.style.setProperty('--mx', (dx * 0.48).toFixed(1) + 'px');
    clone.style.setProperty('--my', (dy * 0.48 - arc).toFixed(1) + 'px');
    clone.style.setProperty('--r1', (idx % 2 ? -168 : 168) + 'deg');
    clone.style.setProperty('--r2', (idx % 2 ? -306 : 306) + 'deg');
    clone.style.setProperty('--r3', (idx % 2 ? -292 : 292) + 'deg');
    clone.style.setProperty('--squash', `${(size / rect.width * 1.14).toFixed(3)},${(size / rect.width * 0.88).toFixed(3)}`);
    clone.style.setProperty('--final-scale', (size / rect.width).toFixed(3));
    requestAnimationFrame(() => {
      clone.classList.add('to-slot-physical');
    });
    runLater(() => {
      clone.remove();
      source.style.opacity = '';
      clearDie(player);
      done();
    }, 720);
  }

  function travelRolledDieToTrash(player, color, done) {
    const { clone, source, rect } = makeDieClone(player, color);
    const target = trashCan.getBoundingClientRect();
    const size = Math.max(18, Math.min(rect.width * 0.48, target.width * 0.34));
    const startCx = rect.left + rect.width / 2;
    const startCy = rect.top + rect.height / 2;
    const endCx = target.left + target.width / 2;
    const endCy = target.top + target.height * 0.28;
    const dx = endCx - startCx;
    const dy = endCy - startCy;
    const arc = clamp(Math.abs(dx) * 0.10 + Math.abs(dy) * 0.16, 38, 118);
    clone.style.setProperty('--tx', dx.toFixed(1) + 'px');
    clone.style.setProperty('--ty', dy.toFixed(1) + 'px');
    clone.style.setProperty('--mx', (dx * 0.44).toFixed(1) + 'px');
    clone.style.setProperty('--my', (dy * 0.44 - arc).toFixed(1) + 'px');
    clone.style.setProperty('--r1', (player === 'p1' ? 190 : -190) + 'deg');
    clone.style.setProperty('--r2', (player === 'p1' ? 420 : -420) + 'deg');
    clone.style.setProperty('--r3', (player === 'p1' ? 610 : -610) + 'deg');
    clone.style.setProperty('--final-scale', (size / rect.width).toFixed(3));
    requestAnimationFrame(() => {
      clone.classList.add('to-trash-physical');
    });
    runLater(() => {
      clone.remove();
      source.style.opacity = '';
      clearDie(player);
      done();
    }, 740);
  }

  function pulseBoardScene(className, duration = 620) {
    if (!boardScene) return;
    boardScene.classList.remove(className);
    void boardScene.offsetWidth;
    boardScene.classList.add(className);
    runLater(() => boardScene.classList.remove(className), duration);
  }

  function triggerTrashCanImpact(load) {
    trashCan.style.setProperty('--can-feed-scale', clamp(1.72 + load * 0.07, 1.82, 3.05).toFixed(2));
    trashCan.style.setProperty('--can-feed-glow', Math.round(clamp(20 + load * 3.1, 24, 82)) + 'px');
    trashCan.style.setProperty('--can-feed-duration', Math.round(clamp(620 + load * 28, 680, 1180)) + 'ms');
    trashCan.classList.remove('flash');
    void trashCan.offsetWidth;
    trashCan.classList.add('flash');
    pulseBoardScene('can-weight-hit', 620);
  }

  function triggerLidWinPulse() {
    boardWrap.classList.remove('lid-win-pulse');
    void boardWrap.offsetWidth;
    boardWrap.classList.add('lid-win-pulse');
    boardWrap.addEventListener('animationend', () => boardWrap.classList.remove('lid-win-pulse'), { once: true });
    Audio.lidWinFanfare();
  }

  function triggerTitleRoundWinFanfare() {
    if (!heroTitle) return;
    heroTitle.classList.remove('round-win-title-fanfare');

    heroTitle.classList.add('round-win-title-fanfare');
