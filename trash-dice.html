<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Trash Dice</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root {
  --yellow:      #f5c800;
  --yellow-dark: #c9a000;
  --yellow-pip:  #1a5c1a;
  --green:       #1e6b1e;
  --green-light: #2a9a2a;
  --green-pip:   #f5c800;
  --bg:          #111;
  --surface:     #1e1e1e;
  --board-rim:   #5a5a5a;
  --board-bg:    #444;
  --slot-empty:  #2e2e2e;
  --text:        #f0f0f0;
  --trash-red:   #d93030;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'Fredoka One', 'Arial Black', sans-serif;
  color: var(--text);
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 0.4rem 0.5rem;
  gap: 0.35rem;
  min-height: 100dvh;
}

/* ── GRAFFITI TITLE ── */
.title-wrap {
  display: flex;
  flex-direction: row;
  align-items: baseline;
  justify-content: center;
  gap: 0.05em;
  position: relative;
  padding: 0.1rem 0.5rem;
  z-index: 10;
}
.title-wrap.big {
  flex-direction: column;
  align-items: center;
  gap: 0.05rem;
  padding: 0.5rem 1rem 0.3rem;
}
.title-trash {
  font-family: 'Bangers', 'Impact', sans-serif;
  font-size: clamp(2.2rem, 8vw, 3.8rem);
  color: #5ee85e;
  -webkit-text-stroke: 2px #1a5c1a;
  text-shadow:
    0 0 0 #1a5c1a,
    3px 3px 0 #1a7a1a,
    5px 5px 0 #0a3a0a,
    1px 1px 8px rgba(0,0,0,0.7);
  transform: rotate(-5deg) translateY(4px);
  display: inline-block;
  letter-spacing: 0.06em;
  line-height: 1;
}
.title-dice {
  font-family: 'Bangers', 'Impact', sans-serif;
  font-size: clamp(2.6rem, 9.5vw, 4.5rem);
  color: #1a1a2a;
  -webkit-text-stroke: 2.5px #5ee85e;
  text-shadow:
    3px 3px 0 #2a9a2a,
    5px 5px 0 #0a3a0a,
    6px 7px 10px rgba(0,0,0,0.65);
  transform: rotate(-2deg);
  display: inline-block;
  letter-spacing: 0.08em;
  line-height: 1;
}
.title-wrap.big .title-trash {
  font-size: clamp(4rem, 18vw, 7rem);
  -webkit-text-stroke: 3.5px #1a5c1a;
  transform: rotate(-6deg) translateY(6px);
}
.title-wrap.big .title-dice {
  font-size: clamp(4.8rem, 22vw, 8.5rem);
  -webkit-text-stroke: 4px #5ee85e;
}
.splatter {
  position: absolute;
  border-radius: 52% 48% 60% 40% / 55% 45% 58% 42%;
  pointer-events: none;
  opacity: 0.72;
  z-index: 0;
}
.sp-y { background: #f5c800; }
.sp-g { background: #5ee85e; }

.tagline {
  font-size: clamp(0.55rem, 1.8vw, 0.75rem);
  color: var(--green-pip);
  letter-spacing: 0.22em;
  text-align: center;
  text-transform: uppercase;
  opacity: 0.8;
}

/* ── STATUS BAR ── */
.status-bar {
  background: rgba(255,255,255,0.06);
  border-radius: 20px;
  padding: 0.25rem 1rem;
  font-size: clamp(0.75rem, 2.5vw, 0.9rem);
  letter-spacing: 0.07em;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.turn-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  transition: background 0.25s;
}

/* ── GAME AREA ── */
.game-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.3rem;
  width: 100%;
  flex: 1;
  min-height: 0;
}

/* ── PLAYER PANELS — horizontal strips ── */
.player-panel {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: clamp(0.25rem, 1.4vw, 0.5rem);
  width: 100%;
  max-width: 480px;
  padding: 0.25rem 0.5rem;
  background: rgba(255,255,255,0.04);
  border-radius: 10px;
}
.player-label {
  font-family: 'Bangers', sans-serif;
  font-size: clamp(1rem, 3.5vw, 1.4rem);
  letter-spacing: 0.08em;
  min-width: clamp(2rem, 8vw, 2.5rem);
}
.player-label.p1 { color: var(--yellow); }
.player-label.p2 { color: var(--green-light); }

/* dice-pool-visual no longer used in panels — piles live on the mat */
.mini-die {
  width: 13px; height: 13px;
  border-radius: 3px;
  flex-shrink: 0;
  box-shadow: 1px 1px 0 rgba(0,0,0,0.4);
  transition: opacity 0.2s;
}
.mini-die.p1 { background: var(--yellow); }
.mini-die.p2 { background: var(--green-light); }

.pool-count {
  font-family: 'Bangers', sans-serif;
  font-size: clamp(1.4rem, 5vw, 2rem);
  line-height: 1;
  min-width: 2rem;
  text-align: right;
}
.pool-count.p1 { color: var(--yellow); }
.pool-count.p2 { color: var(--green-light); }

.pool-sublabel { display: none; }

/* ── BOARD ── */
.board-wrap {
  position: relative;
  width:  clamp(220px, 58vw, 320px);
  height: clamp(220px, 58vw, 320px);
  flex-shrink: 0;
  background: transparent;
}

/* ── SVG SLOT ANIMATIONS ── */
.anim-place { animation: svgPlace 0.38s ease-out; }
.anim-trash { animation: svgTrash 0.38s ease-out; }
@keyframes svgPlace {
  0%   { filter: brightness(0.4); }
  55%  { filter: brightness(1.6); }
  100% { filter: brightness(1); }
}
@keyframes svgTrash {
  0%,100% { filter: none; }
  50%     { filter: brightness(1.7) saturate(2.5) hue-rotate(290deg); }
}

/* ── BOARD DIV (no extra styling — SVG handles all visuals) ── */
.board-wrap { background: transparent; }

/* ── DIE ── */
.die-wrap {
  --roll-die-size: clamp(76px, 22vw, 124px);
  position: relative;
  flex: 0 0 var(--roll-die-size);
  width: var(--roll-die-size);
  height: var(--roll-die-size);
  aspect-ratio: 1 / 1;
  margin: 0.2rem 0;
}
.die {
  width: 100%; height: 100%;
  border-radius: clamp(16px, 4.5vw, 22px);
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  padding: clamp(10px, 3vw, 15px);
  gap: 3px;
  transition: background 0.2s;
  box-shadow: 0 4px 14px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
}
.die.p1 {
  background: linear-gradient(148deg, #ffe84a 0%, #f5c800 28%, #ddb000 62%, #b88e00 100%);
  box-shadow:
    8px 8px 0 0 #9a7400,
    14px 14px 0 0 rgba(0,0,0,0.4),
    0 12px 30px rgba(0,0,0,0.55),
    inset 0 0 0 1px rgba(255,255,255,0.2);
  transform: perspective(500px) rotateX(-10deg) rotateY(10deg);
}
.die.p2 {
  background: linear-gradient(148deg, #30b030 0%, #1e7a1e 30%, #155515 65%, #0a380a 100%);
  box-shadow:
    8px 8px 0 0 #062806,
    14px 14px 0 0 rgba(0,0,0,0.45),
    0 12px 30px rgba(0,0,0,0.55),
    inset 0 0 0 1px rgba(255,255,255,0.1);
  transform: perspective(500px) rotateX(-10deg) rotateY(10deg);
}
.die.idle {
  background: linear-gradient(145deg,#444,#222);
  box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
  transform: none;
}
.die { position: relative; overflow: visible; }
/* Oval gloss highlight */
.die::after {
  content: '';
  position: absolute;
  top: 6%; left: 8%;
  width: 60%; height: 38%;
  background: radial-gradient(ellipse at 38% 28%, rgba(255,255,255,0.62) 0%, rgba(255,255,255,0.1) 55%, transparent 100%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 3;
}
.die.rolling {
  animation: dieRoll 0.85s cubic-bezier(.16,.74,.25,1) both;
  transform-origin: 50% 50%;
}
.die.roll-resolved {
  animation: dieResolvePulse 0.38s cubic-bezier(.18,.9,.22,1) both;
  transform-origin: 50% 50%;
}
.die.trashed { animation: dieTrash 0.55s ease-in forwards; }
@keyframes dieRoll {
  0% {
    transform: perspective(540px) rotateX(-10deg) rotateY(10deg) rotateZ(0deg) scale(1);
    box-shadow: 8px 8px 0 0 rgba(0,0,0,0.42), 14px 14px 0 0 rgba(0,0,0,0.32), 0 12px 30px rgba(0,0,0,0.55), inset 0 0 0 1px rgba(255,255,255,0.16);
  }
  12% {
    transform: perspective(540px) rotateX(18deg) rotateY(-24deg) rotateZ(135deg) scale(1.04);
    box-shadow: 6px 10px 0 0 rgba(0,0,0,0.4), 12px 18px 0 0 rgba(0,0,0,0.24), 0 16px 30px rgba(0,0,0,0.48), inset 0 0 0 1px rgba(255,255,255,0.15);
  }
  24% {
    transform: perspective(540px) rotateX(-26deg) rotateY(30deg) rotateZ(285deg) scale(0.98);
  }
  38% {
    transform: perspective(540px) rotateX(24deg) rotateY(-18deg) rotateZ(475deg) scale(1.05);
  }
  52% {
    transform: perspective(540px) rotateX(-18deg) rotateY(28deg) rotateZ(650deg) scale(0.99);
  }
  66% {
    transform: perspective(540px) rotateX(16deg) rotateY(-22deg) rotateZ(810deg) scale(1.03);
  }
  82% {
    transform: perspective(540px) rotateX(-12deg) rotateY(16deg) rotateZ(1015deg) scale(1.01);
  }
  92% {
    transform: perspective(540px) rotateX(-10deg) rotateY(10deg) rotateZ(1072deg) scale(1.08,0.94);
  }
  100% {
    transform: perspective(540px) rotateX(-10deg) rotateY(10deg) rotateZ(1080deg) scale(1);
    box-shadow: 8px 8px 0 0 rgba(0,0,0,0.42), 14px 14px 0 0 rgba(0,0,0,0.32), 0 12px 30px rgba(0,0,0,0.55), inset 0 0 0 1px rgba(255,255,255,0.16);
  }
}
@keyframes dieResolvePulse {
  0% {
    transform: perspective(540px) rotateX(-10deg) rotateY(10deg) scale(1);
    filter: brightness(1);
  }
  42% {
    transform: perspective(540px) rotateX(-10deg) rotateY(10deg) scale(1.18);
    filter: brightness(1.28);
  }
  72% {
    transform: perspective(540px) rotateX(-10deg) rotateY(10deg) scale(0.96);
    filter: brightness(1.08);
  }
  100% {
    transform: perspective(540px) rotateX(-10deg) rotateY(10deg) scale(1);
    filter: brightness(1);
  }
}
@keyframes dieTrash {
  0%   { transform: perspective(500px) rotateX(-10deg) rotateY(10deg) scale(1); opacity: 1; }
  30%  { transform: perspective(500px) rotateX(20deg) rotateY(-20deg) scale(1.1); opacity: 1; }
  100% { transform: perspective(500px) rotateX(60deg) rotateY(40deg) scale(0.15) translateY(30px); opacity: 0; }
}

.dot-cell {
  display: flex;
  align-items: center;
  justify-content: center;
}
.dot {
  width:  clamp(15px, 4.2vw, 20px);
  height: clamp(15px, 4.2vw, 20px);
  border-radius: 50%;
  background: var(--yellow-pip);
  box-shadow: inset 1px 1px 3px rgba(0,0,0,0.45), 0 1px 1px rgba(255,255,255,0.12);
}
.die.p2 .dot { background: var(--green-pip); }
.die.idle .dot { background: #555; }

/* ── ROLL BUTTON ── */
.roll-btn {
  position: absolute;
  inset: 0;
  z-index: 5;
  border: none;
  border-radius: clamp(16px, 4.5vw, 22px);
  background: transparent;
  color: #ff2424;
  font-family: 'Bangers', sans-serif;
  font-size: clamp(2.4rem, 10.5vw, 4.1rem);
  line-height: 0.85;
  letter-spacing: 0.02em;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transform: rotate(-8deg);
  text-shadow:
    2px 2px 0 #760909,
    0 0 10px rgba(255,36,36,0.35);
  -webkit-text-stroke: 1px rgba(100,0,0,0.25);
  transition: opacity 0.18s ease, transform 0.1s ease, text-shadow 0.18s ease;
}
.die.idle + .roll-btn.p1:not(:disabled) {
  opacity: 1;
  pointer-events: auto;
  animation: rollInkPulse 1.25s ease-in-out infinite;
}
.roll-btn:disabled {
  opacity: 0;
  pointer-events: none;
  cursor: default;
  animation: none;
}
.roll-btn:active:not(:disabled) {
  transform: rotate(-8deg) scale(0.94);
}
.roll-btn:focus-visible {
  outline: 3px solid rgba(245,200,0,0.9);
  outline-offset: -6px;
}

/* ── ROLL BUTTON PULSE ── */
@keyframes rollInkPulse {
  0%,100% {
    opacity: 0.82;
    transform: rotate(-8deg) scale(0.96);
    text-shadow: 2px 2px 0 #760909, 0 0 8px rgba(255,36,36,0.25);
  }
  48% {
    opacity: 1;
    transform: rotate(-8deg) scale(1.08);
    text-shadow: 2px 2px 0 #760909, 0 0 23px rgba(255,36,36,0.82), 0 0 34px rgba(245,200,0,0.42);
  }
}

/* ── MESSAGE ── */
.message {
  min-height: 1.3rem;
  font-size: clamp(0.7rem, 2.2vw, 0.85rem);
  letter-spacing: 0.06em;
  text-align: center;
  padding: 0 0.5rem;
}
.message.ok    { color: #88ee88; }
.message.trash { color: var(--trash-red); }
.message.win   { color: var(--yellow); }

/* ── ROUND FLASH ── */
.round-flash {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 5;
  opacity: 0;
}
.round-flash.p1 { animation: flashY 0.9s ease-out forwards; }
.round-flash.p2 { animation: flashG 0.9s ease-out forwards; }
@keyframes flashY {
  0%   { background: rgba(245,200,0,0);    opacity: 1; }
  20%  { background: rgba(245,200,0,0.28); }
  100% { background: rgba(245,200,0,0);    opacity: 0; }
}
@keyframes flashG {
  0%   { background: rgba(30,107,30,0);    opacity: 1; }
  20%  { background: rgba(30,107,30,0.32); }
  100% { background: rgba(30,107,30,0);    opacity: 0; }
}

/* ── SET CLAIM BADGE ── */
.claim-badge {
  position: fixed;
  z-index: 60;
  pointer-events: none;
  min-width: 138px;
  padding: 0.45rem 0.65rem 0.38rem;
  border-radius: 12px;
  text-align: center;
  transform: translate(-50%, -50%) scale(0.7) rotate(-4deg);
  opacity: 0;
  box-shadow: 0 8px 0 rgba(0,0,0,0.4), 0 18px 32px rgba(0,0,0,0.35);
  animation: claimPop 1.35s ease-out forwards;
}
.claim-badge.p1 {
  background: linear-gradient(180deg, #ffe84a 0%, #f5c800 100%);
  color: #1a5c1a;
  border: 3px solid #1a5c1a;
}
.claim-badge.p2 {
  background: linear-gradient(180deg, #37bd37 0%, #1e6b1e 100%);
  color: #f5c800;
  border: 3px solid #f5c800;
}
.claim-main {
  font-family: 'Bangers', sans-serif;
  font-size: clamp(1.4rem, 5vw, 2rem);
  letter-spacing: 0.1em;
  line-height: 0.95;
  text-shadow: 1px 1px 0 rgba(255,255,255,0.28);
}
.claim-sub {
  margin-top: 0.15rem;
  font-size: clamp(0.55rem, 2vw, 0.72rem);
  letter-spacing: 0.08em;
  opacity: 0.86;
}
@keyframes claimPop {
  0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.55) rotate(-8deg); }
  16%  { opacity: 1; transform: translate(-50%, -50%) scale(1.14) rotate(3deg); }
  34%  { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(-3deg); }
  78%  { opacity: 1; transform: translate(-50%, -68%) scale(1) rotate(-3deg); }
  100% { opacity: 0; transform: translate(-50%, -92%) scale(0.82) rotate(-3deg); }
}

/* ── BOARD SCENE ── */
.board-scene {
  --lid-offset: clamp(-60px, -15vw, -34px);
  --can-offset: clamp(118px, 31vw, 190px);
  position: relative;
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  width: 100%;
  padding: 1.2rem 0.5rem clamp(2.3rem, 7vw, 4.8rem);
  flex-shrink: 0;
  overflow: visible;
}
.board-blob {
  position: absolute;
  inset: 0;
  background: #c5d400;
  border-radius: 71% 29% 58% 42% / 44% 63% 37% 56%;
  z-index: 0;
  box-shadow: 0 8px 40px rgba(0,0,0,0.35);
}
.board-ring-text {
  position: absolute;
  display: none;
  /* centered on the board-wrap; sized relative to board */
  width:  clamp(276px, 74vw, 410px);
  height: clamp(276px, 74vw, 410px);
  z-index: 5;
  pointer-events: none;
  overflow: visible;
  left: calc(50% + var(--lid-offset)); top: 50%;
  transform: translate(-50%, -50%);
}
.board-wrap {
  z-index: 4;
  transform: translateX(var(--lid-offset));
}
.board-wrap.lid-win-pulse {
  z-index: 85;
  animation: lidWinPulse 0.92s cubic-bezier(.13,.85,.16,1);
}
.board-wrap.game-win-spin {
  z-index: 120;
  animation: boardGameWinSpin 2.45s cubic-bezier(.09,.82,.12,1);
}
@keyframes lidWinPulse {
  0%,100% {
    transform: translateX(var(--lid-offset)) scale(1);
    filter: drop-shadow(0 6px 12px rgba(0,0,0,0.58));
  }
  18% {
    transform: translateX(var(--lid-offset)) scale(1.72) rotate(-4deg);
    filter: drop-shadow(0 0 36px rgba(245,200,0,0.95));
  }
  42% {
    transform: translateX(var(--lid-offset)) scale(1.18) rotate(3deg);
    filter: drop-shadow(0 0 26px rgba(94,232,94,0.72));
  }
  66% {
    transform: translateX(var(--lid-offset)) scale(1.34) rotate(-1deg);
    filter: drop-shadow(0 0 18px rgba(255,255,255,0.6));
  }
}
@keyframes boardGameWinSpin {
  0% {
    transform: translateX(var(--lid-offset)) rotate(0deg) scale(1);
    filter: drop-shadow(0 6px 12px rgba(0,0,0,0.58));
  }
  16% {
    transform: translateX(var(--lid-offset)) rotate(126deg) scale(1.38);
    filter: drop-shadow(0 0 42px rgba(245,200,0,0.96));
  }
  38% {
    transform: translateX(var(--lid-offset)) rotate(360deg) scale(1.08);
    filter: drop-shadow(0 0 34px rgba(94,232,94,0.82));
  }
  64% {
    transform: translateX(var(--lid-offset)) rotate(612deg) scale(1.46);
    filter: drop-shadow(0 0 48px rgba(255,255,255,0.74));
  }
  100% {
    transform: translateX(var(--lid-offset)) rotate(720deg) scale(1);
    filter: drop-shadow(0 6px 12px rgba(0,0,0,0.58));
  }
}

/* ── SHARED TRASH CAN ── */
.trash-can {
  position: absolute;
  left: calc(50% + var(--can-offset));
  top: calc(50% + clamp(8px, 4vw, 26px));
  width: clamp(126px, 29vw, 190px);
  height: clamp(156px, 36vw, 226px);
  z-index: 2;
  pointer-events: none;
  transform: translate(-50%, -50%);
  transform-origin: 50% 46%;
  filter: drop-shadow(0 8px 10px rgba(0,0,0,0.45));
  --can-feed-scale: 3;
  --can-feed-glow: 34px;
  --can-feed-duration: 720ms;
}
.trash-can svg {
  width: 100%;
  height: 100%;
  overflow: visible;
}
.trash-can.flash {
  z-index: 90;
  animation: canFlash var(--can-feed-duration) cubic-bezier(.12,.82,.2,1);
}
.trash-can.pour {
  animation: canPour 1.05s ease-in-out;
}
.trash-can.victory-erupt {
  z-index: 122;
  animation: canVictoryErupt 1.35s cubic-bezier(.12,.82,.16,1);
}
@keyframes canFlash {
  0%,100% { transform: translate(-50%, -50%) rotate(0deg) scale(1); filter: drop-shadow(0 8px 10px rgba(0,0,0,0.45)); }
  16%     { transform: translate(-50%, -54%) rotate(-6deg) scale(var(--can-feed-scale)); filter: drop-shadow(0 0 var(--can-feed-glow) rgba(217,48,48,0.95)); }
  34%     { transform: translate(-50%, -48%) rotate(5deg) scale(1.22); filter: drop-shadow(0 16px 18px rgba(0,0,0,0.65)); }
  52%     { transform: translate(-50%, -51%) rotate(-3deg) scale(1.52); filter: drop-shadow(0 0 24px rgba(245,200,0,0.55)); }
  74%     { transform: translate(-50%, -50%) rotate(2deg) scale(0.96); }
}
@keyframes canPour {
  0%   { transform: translate(-50%, -50%) rotate(0deg) scale(1); filter: drop-shadow(0 8px 10px rgba(0,0,0,0.45)); }
  18%  { transform: translate(-52%, -54%) rotate(-10deg) scale(1.03); filter: drop-shadow(0 0 20px rgba(245,200,0,0.72)); }
  38%  { transform: translate(-48%, -48%) rotate(9deg) scale(1.04); }
  58%  { transform: translate(-52%, -56%) rotate(-7deg) scale(1.02); }
  78%  { transform: translate(-49%, -52%) rotate(4deg) scale(1); }
  100% { transform: translate(-50%, -50%) rotate(0deg) scale(1); filter: drop-shadow(0 8px 10px rgba(0,0,0,0.45)); }
}
@keyframes canVictoryErupt {
  0%,100% { transform: translate(-50%, -50%) rotate(0deg) scale(1); filter: drop-shadow(0 8px 10px rgba(0,0,0,0.45)); }
  12%     { transform: translate(-50%, -60%) rotate(-9deg) scale(1.26); filter: drop-shadow(0 0 40px rgba(245,200,0,0.95)); }
  28%     { transform: translate(-50%, -44%) rotate(8deg) scale(0.96); filter: drop-shadow(0 18px 20px rgba(0,0,0,0.68)); }
  48%     { transform: translate(-50%, -56%) rotate(-5deg) scale(1.18); filter: drop-shadow(0 0 30px rgba(94,232,94,0.82)); }
  72%     { transform: translate(-50%, -49%) rotate(3deg) scale(1.04); }
}

.travelling-die {
  position: fixed;
  margin: 0;
  pointer-events: none;
  z-index: 70;
  transition:
    left 0.58s cubic-bezier(.19,.92,.28,1.02),
    top 0.58s cubic-bezier(.19,.92,.28,1.02),
    width 0.58s ease,
    height 0.58s ease,
    transform 0.58s ease,
    opacity 0.18s ease 0.5s;
}
.travelling-die.to-trash {
  opacity: 0;
}
.can-pour-die {
  position: fixed;
  width: 18px;
  height: 18px;
  border-radius: 5px;
  pointer-events: none;
  z-index: 72;
  box-shadow:
    1px 1px 0 rgba(0,0,0,0.5),
    0 0 12px rgba(255,255,255,0.64),
    -12px -6px 18px rgba(255,45,85,0.56),
    10px 7px 18px rgba(53,210,255,0.48),
    inset 0 1px 0 rgba(255,255,255,0.24);
  animation: canPourRainbow 0.62s linear infinite;
  transition:
    left 0.72s cubic-bezier(.16,.86,.22,1),
    top 0.72s cubic-bezier(.16,.86,.22,1),
    transform 0.72s ease,
    opacity 0.18s ease 0.58s;
}
.can-pour-die::after {
  content: '';
  position: absolute;
  left: -18px;
  top: 45%;
  width: 24px;
  height: 4px;
  border-radius: 999px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), rgba(245,200,0,0.85), rgba(94,232,94,0.72));
  transform: translateY(-50%) rotate(-18deg);
  opacity: 0.72;
}
@keyframes canPourRainbow {
  0%   { filter: hue-rotate(0deg) brightness(1.12); }
  50%  { filter: hue-rotate(120deg) brightness(1.34); }
  100% { filter: hue-rotate(240deg) brightness(1.12); }
}
.victory-cannon-die {
  position: fixed;
  width: clamp(15px, 3.8vw, 24px);
  height: clamp(15px, 3.8vw, 24px);
  overflow: visible;
  z-index: 125;
  pointer-events: none;
  transform: translate(-50%, -50%);
  animation: victoryCannonDie var(--cannon-duration, 1500ms) cubic-bezier(.1,.84,.1,1) var(--cannon-delay, 0ms) forwards;
  box-shadow:
    2px 2px 0 rgba(0,0,0,0.54),
    0 0 18px rgba(255,255,255,0.74),
    0 0 30px rgba(245,200,0,0.42);
}
.victory-cannon-die::after {
  content: '';
  position: absolute;
  left: -22px;
  top: 50%;
  width: 30px;
  height: 5px;
  border-radius: 999px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.95), rgba(245,200,0,0.82), rgba(94,232,94,0.72));
  transform: translateY(-50%) rotate(-18deg);
  opacity: 0.74;
}
@keyframes victoryCannonDie {
  0% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.42) rotate(0deg);
    filter: brightness(1.55) saturate(1.2);
  }
  8% {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1.35) rotate(58deg);
  }
  44% {
    opacity: 1;
    transform: translate(calc(-50% + var(--mx)), calc(-50% + var(--my))) scale(1.16) rotate(calc(var(--rot) * 0.56));
    filter: hue-rotate(110deg) brightness(1.35) saturate(1.35);
  }
  100% {
    opacity: 0;
    transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0.48) rotate(var(--rot));
    filter: hue-rotate(240deg) brightness(1.1);
  }
}
.victory-screen-burst {
  position: fixed;
  inset: 0;
  z-index: 118;
  pointer-events: none;
  opacity: 0;
  background:
    radial-gradient(circle at 50% 46%, rgba(245,200,0,0.46), transparent 22%),
    radial-gradient(circle at 50% 46%, rgba(94,232,94,0.36), transparent 36%),
    radial-gradient(circle at 50% 46%, rgba(255,255,255,0.28), transparent 48%);
  animation: victoryScreenBurst 1.55s ease-out forwards;
}
@keyframes victoryScreenBurst {
  0%   { opacity: 0; transform: scale(0.55); filter: blur(0); }
  16%  { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.8); filter: blur(12px); }
}

/* ── DICE PILES (on the mat) ── */
.dice-pile {
  position: relative;
  z-index: 2;
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  width: clamp(50px, 14vw, 72px);
  align-content: center;
  justify-content: center;
}
.mini-die {
  position: relative;
  width: 14px; height: 14px;
  border-radius: 3px;
  flex-shrink: 0;
  box-shadow: 1px 1px 0 rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.18);
  overflow: hidden;
}
.mini-die.p1 { background: var(--yellow); }
.mini-die.p2 { background: var(--green-light); }
.mini-pip {
  position: absolute;
  width: 3px; height: 3px;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}
.mini-die.p1 .mini-pip { background: var(--yellow-pip); }
.mini-die.p2 .mini-pip { background: var(--green-pip); }

/* Turn tag — inline in player panel */
.turn-tag {
  font-family: 'Bangers', sans-serif;
  font-size: clamp(0.75rem, 2.5vw, 1rem);
  letter-spacing: 0.1em;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.turn-tag.active { opacity: 1; }
.turn-tag.p1 { color: var(--yellow); }
.turn-tag.p2 { color: var(--green-light); }
/* pile inside player panel — takes remaining width */
.panel-pile {
  flex: 1 1 clamp(62px, 17vw, 132px);
  width: auto;
  min-width: clamp(62px, 17vw, 132px);
  max-height: clamp(36px, 11vw, 54px);
  overflow: hidden;
  align-content: center;
  align-items: center;
  justify-content: flex-start;
  gap: 2px;
}
.panel-pile .mini-die {
  width: clamp(9px, 2.7vw, 13px);
  height: clamp(9px, 2.7vw, 13px);
  border-radius: 2px;
}
.panel-pile .mini-pip {
  width: 2px;
  height: 2px;
}

/* scattered pile look */
.dice-pile .mini-die:nth-child(7n)   { transform: rotate(18deg); }
.dice-pile .mini-die:nth-child(7n+1) { transform: rotate(-12deg); }
.dice-pile .mini-die:nth-child(7n+2) { transform: rotate(7deg); }
.dice-pile .mini-die:nth-child(7n+3) { transform: rotate(-5deg); }
.dice-pile .mini-die:nth-child(7n+4) { transform: rotate(14deg); }
.dice-pile .mini-die:nth-child(7n+5) { transform: rotate(-9deg); }
.dice-pile .mini-die:nth-child(7n+6) { transform: rotate(3deg); }

/* ── START OVERLAY ── */
.start-overlay {
  position: fixed; inset: 0;
  background: #c8d400;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  z-index: 30;
  transition: opacity 0.5s;
}
.start-overlay.hide {
  opacity: 0;
  pointer-events: none;
}
.start-blob-wrap {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  width: clamp(200px, 55vw, 280px);
  height: clamp(200px, 55vw, 280px);
}
.start-blob {
  position: absolute; inset: 0;
  background: #c5d400;
  border-radius: 55% 45% 60% 40% / 48% 58% 42% 52%;
}
.start-dice-row {
  position: relative;
  display: flex;
  gap: 1rem;
  align-items: center;
  justify-content: center;
  z-index: 1;
}
.start-die {
  width: clamp(60px, 16vw, 78px);
  height: clamp(60px, 16vw, 78px);
  border-radius: clamp(12px, 3.5vw, 18px);
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  padding: clamp(8px, 2.5vw, 12px);
  gap: 3px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.45);
}
.start-die.yellow {
  background: linear-gradient(148deg, #ffe84a 0%, #f5c800 30%, #ddb000 65%, #b88e00 100%);
  box-shadow: 7px 7px 0 0 #9a7400, 12px 12px 0 0 rgba(0,0,0,0.4), 0 10px 24px rgba(0,0,0,0.5);
  transform: perspective(500px) rotateX(-10deg) rotateY(10deg);
}
.start-die.green {
  background: linear-gradient(148deg, #30b030 0%, #1e7a1e 30%, #155515 65%, #0a380a 100%);
  box-shadow: 7px 7px 0 0 #062806, 12px 12px 0 0 rgba(0,0,0,0.45), 0 10px 24px rgba(0,0,0,0.5);
  transform: perspective(500px) rotateX(-10deg) rotateY(-10deg);
}
.start-die .dot { background: var(--yellow-pip); box-shadow: inset 1px 1px 2px rgba(0,0,0,0.4); }
.start-die.green .dot { background: var(--green-pip); }
.start-tagline {
  font-size: clamp(1rem, 3.5vw, 1.3rem);
  letter-spacing: 0.08em;
  text-align: center;
  color: var(--text);
  opacity: 0.85;
}
.start-btn {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.42);
  color: #fff;
  border: none;
  border-radius: 50%;
  font-family: 'Bangers', sans-serif;
  font-size: clamp(1.8rem, 7vw, 3rem);
  letter-spacing: 0.12em;
  cursor: pointer;
  z-index: 5;
  display: flex;
  align-items: center;
  justify-content: center;
  text-shadow: 0 2px 8px rgba(0,0,0,0.7);
  animation: startPulse 1.3s ease-in-out infinite;
}
@keyframes startPulse {
  0%,100% { opacity: 0.72; box-shadow: inset 0 0 0 0 rgba(255,255,255,0), 0 0 0 rgba(0,0,0,0); }
  50%      { opacity: 1;    box-shadow: inset 0 0 0 8px rgba(255,255,255,0.12), 0 0 28px rgba(255,255,255,0.3); }
}

/* ── GAME OVER OVERLAY ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.9rem;
  z-index: 20;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s;
}
.overlay.show { opacity: 1; pointer-events: all; }
.overlay.victory {
  background:
    radial-gradient(circle at 50% 42%, rgba(245,200,0,0.18), transparent 34%),
    rgba(0,0,0,0.86);
}
.overlay.victory .overlay-title {
  animation: victoryTitlePunch 1.08s cubic-bezier(.13,.85,.16,1) 0.12s both;
}
.overlay-title {
  font-size: clamp(1.8rem, 7vw, 3rem);
  color: var(--yellow);
  text-shadow: 3px 3px 0 var(--green);
  text-align: center;
}
.overlay-sub {
  font-size: clamp(0.85rem, 2.8vw, 1.1rem);
  opacity: 0.75;
  text-align: center;
  letter-spacing: 0.06em;
}
.overlay-stats {
  font-size: clamp(0.7rem, 2.2vw, 0.85rem);
  opacity: 0.55;
  letter-spacing: 0.08em;
  text-align: center;
}
.play-again-btn {
  background: var(--yellow);
  color: var(--yellow-pip);
  border: none;
  border-radius: 10px;
  padding: 0.6rem 2.2rem;
  font-family: inherit;
  font-size: 1.1rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  margin-top: 0.3rem;
  box-shadow: 0 4px 0 var(--yellow-dark);
}
@keyframes victoryTitlePunch {
  0%   { transform: scale(0.68) rotate(-4deg); filter: brightness(1); }
  36%  { transform: scale(1.28) rotate(2deg); filter: brightness(1.35); }
  62%  { transform: scale(0.96) rotate(-1deg); }
  100% { transform: scale(1) rotate(0deg); filter: brightness(1); }
}
</style>
</head>

        <div class="dot-cell"></div><div class="dot-cell"><div class="dot"></div></div><div class="dot-cell"></div>
        <div class="dot-cell"><div class="dot"></div></div><div class="dot-cell"></div><div class="dot-cell"></div>
      </div>
    </div>

<script>
(function () {

  // ── MINI DIE PIP POSITIONS ([top%, left%]) ───────────────────
  const MINI_DOTS = [
    [],
    [[50,50]],
    [[25,75],[75,25]],
    [[25,75],[50,50],[75,25]],
    [[25,25],[25,75],[75,25],[75,75]],
    [[25,25],[25,75],[50,50],[75,25],[75,75]],
    [[25,25],[25,75],[50,25],[50,75],[75,25],[75,75]],
  ];

  // ── DOT PATTERNS (3×3 grid, [row,col]) ──────────────────────
  const DOTS = [
    [],
    [[1,1]],
    [[0,2],[2,0]],
    [[0,2],[1,1],[2,0]],
    [[0,0],[0,2],[2,0],[2,2]],
    [[0,0],[0,2],[1,1],[2,0],[2,2]],
    [[0,0],[0,2],[1,0],[1,2],[2,0],[2,2]],
  ];

  // ── STATE ────────────────────────────────────────────────────
  let board;       // null | { player, color }, length 6, index = face-1
  let pools;       // { p1:{yellow,green}, p2:{yellow,green} }
  let trashed;     // {p1, p2}
  let current;     // 'p1' | 'p2'
  let round;
  let busy;
  let totalRolls;
  let gameStarted;

  const COLORS = ['yellow', 'green'];
  const COLOR_CLASS = { yellow: 'p1', green: 'p2' };
  const PLAYER_NAME = { p1: 'You', p2: 'CPU' };
  const ROLL_ANIMATION_MS = 850;
  const ROLL_REVEAL_HOLD_MS = 650;
  const TURN_HANDOFF_MS = 950;
  const CPU_START_MS = 650;

  function totalDice(player) {
    return COLORS.reduce((sum, color) => sum + pools[player][color], 0);
  }

  function totalTrashedDice() {
    return trashed.p1 + trashed.p2;
  }

  function chooseDieColor(player) {
    let pick = Math.floor(Math.random() * totalDice(player)) + 1;
    for (const color of COLORS) {
      pick -= pools[player][color];
      if (pick <= 0) return color;
    }
    return null;
  }

  function takeDie(player) {
    const color = chooseDieColor(player);
    if (!color) return null;
    pools[player][color]--;
    return color;
  }

  function colorClass(color) {
    return COLOR_CLASS[color] || 'p1';
  }

  function slotColors(color) {
    return color === 'yellow'
      ? { fill: '#f5c800', stroke: '#c9a000', label: '#1a5c1a' }
      : { fill: '#1e6b1e', stroke: '#145014', label: '#f5c800' };
  }

  function paintSlot(idx, die) {
    const colors = slotColors(die.color);
    const slot = slotEls[idx];
    const label = labelEls[idx];
    slot.setAttribute('fill', '#737b7d');
    slot.setAttribute('stroke', '#b9c0c0');
    label.setAttribute('fill', 'rgba(45,50,51,0.18)');

    if (slotDiceEls[idx]) slotDiceEls[idx].remove();
    const info = slotInfo[idx];
    const svg = boardWrap.querySelector('svg.lid-svg');
    if (!svg || !info) return;

    const NS = 'http://www.w3.org/2000/svg';
    const g = document.createElementNS(NS, 'g');
    g.setAttribute('transform', `translate(${f(info.x)} ${f(info.y)}) rotate(${f(info.angle + 8)})`);
    g.setAttribute('pointer-events', 'none');

    const size = 27;
    const side = document.createElementNS(NS, 'rect');
    side.setAttribute('x', f(-size / 2 + 3)); side.setAttribute('y', f(-size / 2 + 4));
    side.setAttribute('width', size); side.setAttribute('height', size);
    side.setAttribute('rx', '5'); side.setAttribute('fill', die.color === 'yellow' ? '#9a7400' : '#063006');
    side.setAttribute('opacity', '0.75');
    g.appendChild(side);

    const face = document.createElementNS(NS, 'rect');
    face.setAttribute('x', f(-size / 2)); face.setAttribute('y', f(-size / 2));
    face.setAttribute('width', size); face.setAttribute('height', size);
    face.setAttribute('rx', '5.2');
    face.setAttribute('fill', colors.fill);
    face.setAttribute('stroke', colors.stroke);
    face.setAttribute('stroke-width', '1.4');
    g.appendChild(face);

    (DOTS[idx + 1] || []).forEach(([row, col]) => {
      const pip = document.createElementNS(NS, 'circle');
      pip.setAttribute('cx', f((col - 1) * 7.1));
      pip.setAttribute('cy', f((row - 1) * 7.1));
      pip.setAttribute('r', '2.25');
      pip.setAttribute('fill', colors.label);
      pip.setAttribute('filter', 'drop-shadow(0 0.6px 0 rgba(0,0,0,0.45))');
      g.appendChild(pip);
    });

    svg.appendChild(g);
    slotDiceEls[idx] = g;
  }

  function diceMix(dice) {
    return {
      yellow: dice.filter(die => die.color === 'yellow').length,
      green: dice.filter(die => die.color === 'green').length
    };
  }

  function clamp(n, min, max) {
    return Math.max(min, Math.min(max, n));
  }

  // ── REFS ─────────────────────────────────────────────────────
  const boardWrap   = document.getElementById('boardWrap');
  const p1Die       = document.getElementById('p1Die');
  const p2Die       = document.getElementById('p2Die');
  const rollBtn     = document.getElementById('rollBtn');
  function getDie(p) { return p === 'p1' ? p1Die : p2Die; }
  const msgEl       = document.getElementById('message');
  const statusText  = document.getElementById('statusText');
  const turnDot     = document.getElementById('turnDot');
  const p1PoolEl    = document.getElementById('p1Pool');
  const p2PoolEl    = document.getElementById('p2Pool');
  const p1Pile      = document.getElementById('p1Pile');
  const p2Pile      = document.getElementById('p2Pile');
  const trashCan    = document.getElementById('trashCan');
  const p1TurnTag   = document.getElementById('p1TurnTag');
  const p2TurnTag   = document.getElementById('p2TurnTag');
  const roundFlash  = document.getElementById('roundFlash');
  const overlay     = document.getElementById('overlay');
  const overlayTitle= document.getElementById('overlayTitle');
  const overlaySub  = document.getElementById('overlaySub');
  const overlayStats= document.getElementById('overlayStats');
  const playAgainBtn= document.getElementById('playAgainBtn');

  let slotEls  = [];  // SVG slot elements
  let labelEls = [];  // SVG number labels
  let slotDiceEls = [];
  let slotInfo = [];

  // ── BUILD SVG LID ────────────────────────────────────────────
  function buildSlots() {
    const old = boardWrap.querySelector('svg.lid-svg');
    if (old) old.remove();
    slotEls = []; labelEls = [];

    const NS  = 'http://www.w3.org/2000/svg';
    const S   = 200;
    const cx  = 100, cy = 100;

    const svg = document.createElementNS(NS, 'svg');
    svg.setAttribute('viewBox', `0 0 ${S} ${S}`);
    svg.setAttribute('width',  '100%');
    svg.setAttribute('height', '100%');
    svg.classList.add('lid-svg');
    svg.style.cssText = 'position:absolute;inset:0;overflow:visible;';

    // ── Defs: radial gradient for rim ──
    const defs = document.createElementNS(NS, 'defs');
    const rg   = document.createElementNS(NS, 'radialGradient');
    rg.setAttribute('id', 'rimG'); rg.setAttribute('cx','35%'); rg.setAttribute('cy','30%');
    const rs1 = document.createElementNS(NS, 'stop');
    rs1.setAttribute('offset','0%');   rs1.setAttribute('stop-color','#b0b0b0');
    const rs2 = document.createElementNS(NS, 'stop');
    rs2.setAttribute('offset','100%'); rs2.setAttribute('stop-color','#606060');
    rg.appendChild(rs1); rg.appendChild(rs2); defs.appendChild(rg);

    const pg = document.createElementNS(NS, 'radialGradient');
    pg.setAttribute('id', 'plateG'); pg.setAttribute('cx','40%'); pg.setAttribute('cy','35%');
    const ps1 = document.createElementNS(NS, 'stop');
    ps1.setAttribute('offset','0%');   ps1.setAttribute('stop-color','#a8a8a8');
    const ps2 = document.createElementNS(NS, 'stop');
    ps2.setAttribute('offset','100%'); ps2.setAttribute('stop-color','#7a7a7a');
    pg.appendChild(ps1); pg.appendChild(ps2); defs.appendChild(pg);
    svg.appendChild(defs);

    // ── Outer rim ──
    const rim = document.createElementNS(NS, 'circle');
    rim.setAttribute('cx',cx); rim.setAttribute('cy',cy); rim.setAttribute('r',98);
    rim.setAttribute('fill','url(#rimG)');
    rim.setAttribute('filter','drop-shadow(0 6px 12px rgba(0,0,0,0.6))');
    svg.appendChild(rim);

    // ── Inner plate ──
    const plate = document.createElementNS(NS, 'circle');
    plate.setAttribute('cx',cx); plate.setAttribute('cy',cy); plate.setAttribute('r',90);
    plate.setAttribute('fill','url(#plateG)');
    svg.appendChild(plate);

    // ── 6 pie-slice compartments ──
    const rO = 82, rI = 22, gap = 5;
    for (let i = 0; i < 6; i++) {
      const val      = i + 1;
      const sDeg     = i * 60 - 90 + gap;
      const eDeg     = (i + 1) * 60 - 90 - gap;
      const sRad     = sDeg * Math.PI / 180;
      const eRad     = eDeg * Math.PI / 180;
      const ox1 = cx + rO * Math.cos(sRad), oy1 = cy + rO * Math.sin(sRad);
      const ox2 = cx + rO * Math.cos(eRad), oy2 = cy + rO * Math.sin(eRad);
      const ix1 = cx + rI * Math.cos(sRad), iy1 = cy + rI * Math.sin(sRad);
      const ix2 = cx + rI * Math.cos(eRad), iy2 = cy + rI * Math.sin(eRad);
      const d = `M${f(ix1)} ${f(iy1)} L${f(ox1)} ${f(oy1)} A${rO} ${rO} 0 0 1 ${f(ox2)} ${f(oy2)} L${f(ix2)} ${f(iy2)} A${rI} ${rI} 0 0 0 ${f(ix1)} ${f(iy1)}Z`;

      const path = document.createElementNS(NS, 'path');
      path.setAttribute('d', d);
      path.setAttribute('fill', '#5e5e5e');
      path.setAttribute('stroke', '#a0a0a0');
      path.setAttribute('stroke-width', '2');
      path.setAttribute('stroke-linejoin', 'round');
      svg.appendChild(path);

      // Number label
      const midRad = ((sDeg + eDeg) / 2) * Math.PI / 180;
      const rL = (rO + rI) / 2;
      const tx = cx + rL * Math.cos(midRad), ty = cy + rL * Math.sin(midRad);
      const txt = document.createElementNS(NS, 'text');
      txt.setAttribute('x', f(tx)); txt.setAttribute('y', f(ty));
      txt.setAttribute('text-anchor', 'middle');
      txt.setAttribute('dominant-baseline', 'central');
      txt.setAttribute('fill', 'rgba(255,255,255,0.38)');
      txt.setAttribute('font-family', 'Fredoka One, Arial Black, sans-serif');
      txt.setAttribute('font-size', '14');
      txt.setAttribute('pointer-events', 'none');
      txt.textContent = val;
      svg.appendChild(txt);

      slotEls.push(path);
      labelEls.push(txt);
    }

    // ── Raised divider lines (spokes) ──
    for (let i = 0; i < 6; i++) {
      const ang  = (i * 60 - 90) * Math.PI / 180;
      const line = document.createElementNS(NS, 'line');
      line.setAttribute('x1', f(cx + rI * Math.cos(ang)));
      line.setAttribute('y1', f(cy + rI * Math.sin(ang)));
      line.setAttribute('x2', f(cx + rO * Math.cos(ang)));
      line.setAttribute('y2', f(cy + rO * Math.sin(ang)));
      line.setAttribute('stroke', '#a8a8a8');
      line.setAttribute('stroke-width', '3');
      line.setAttribute('pointer-events', 'none');
      svg.appendChild(line);
    }

    // ── Center hub ──
    const hub = document.createElementNS(NS, 'circle');
    hub.setAttribute('cx',cx); hub.setAttribute('cy',cy); hub.setAttribute('r',20);
    hub.setAttribute('fill','url(#rimG)');
    hub.setAttribute('stroke','#b0b0b0'); hub.setAttribute('stroke-width','1.5');
    svg.appendChild(hub);

    boardWrap.appendChild(svg);
  }

  buildSlots = function() {
    const old = boardWrap.querySelector('svg.lid-svg');
    if (old) old.remove();
    slotEls = []; labelEls = []; slotDiceEls = []; slotInfo = [];

    const NS = 'http://www.w3.org/2000/svg';
    const S = 200;
    const cx = 100, cy = 100;
    const make = (tag, attrs = {}) => {
      const el = document.createElementNS(NS, tag);
      Object.entries(attrs).forEach(([key, value]) => el.setAttribute(key, value));
      return el;
    };

    const svg = make('svg', { viewBox:`0 0 ${S} ${S}`, width:'100%', height:'100%' });
    svg.classList.add('lid-svg');
    svg.style.cssText = 'position:absolute;inset:0;overflow:visible;';

    const defs = make('defs');
    const rimG = make('radialGradient', { id:'rimG', cx:'35%', cy:'28%' });
    rimG.appendChild(make('stop', { offset:'0%', 'stop-color':'#c9d0d0' }));
    rimG.appendChild(make('stop', { offset:'55%', 'stop-color':'#8f9899' }));
    rimG.appendChild(make('stop', { offset:'100%', 'stop-color':'#4c5456' }));
    defs.appendChild(rimG);
    const plateG = make('radialGradient', { id:'plateG', cx:'40%', cy:'30%' });
    plateG.appendChild(make('stop', { offset:'0%', 'stop-color':'#a9b1b2' }));
    plateG.appendChild(make('stop', { offset:'64%', 'stop-color':'#7c8586' }));
    plateG.appendChild(make('stop', { offset:'100%', 'stop-color':'#5d6668' }));
    defs.appendChild(plateG);
    const pocketG = make('linearGradient', { id:'pocketG', x1:'0', x2:'1', y1:'0', y2:'1' });
    pocketG.appendChild(make('stop', { offset:'0%', 'stop-color':'#899293' }));
    pocketG.appendChild(make('stop', { offset:'100%', 'stop-color':'#596163' }));
    defs.appendChild(pocketG);
    svg.appendChild(defs);

    svg.appendChild(make('circle', { cx, cy, r:98, fill:'url(#rimG)', filter:'drop-shadow(0 6px 12px rgba(0,0,0,0.58))' }));
    svg.appendChild(make('circle', { cx, cy, r:88, fill:'#6e7778' }));
    svg.appendChild(make('circle', { cx, cy, r:80, fill:'url(#plateG)', stroke:'#454d4f', 'stroke-width':'2.5' }));

    for (let i = 0; i < 6; i++) {
      const ang = (-90 + i * 60 + 30) * Math.PI / 180;
      svg.appendChild(make('line', {
        x1:f(cx + 18 * Math.cos(ang)), y1:f(cy + 18 * Math.sin(ang)),
        x2:f(cx + 74 * Math.cos(ang)), y2:f(cy + 74 * Math.sin(ang)),
        stroke:'#4d5658', 'stroke-width':'2.8', 'stroke-linecap':'round', opacity:'0.75',
        'pointer-events':'none'
      }));
      svg.appendChild(make('line', {
        x1:f(cx + 21 * Math.cos(ang)), y1:f(cy + 21 * Math.sin(ang)),
        x2:f(cx + 70 * Math.cos(ang)), y2:f(cy + 70 * Math.sin(ang)),
        stroke:'#9ea7a8', 'stroke-width':'1.1', 'stroke-linecap':'round', opacity:'0.72',
        'pointer-events':'none'
      }));
    }

    const slotR = 55;
    for (let i = 0; i < 6; i++) {
      const val = i + 1;
      const midDeg = -90 + i * 60;
      const midRad = midDeg * Math.PI / 180;
      const tx = cx + slotR * Math.cos(midRad);
      const ty = cy + slotR * Math.sin(midRad);
      const angle = midDeg + 90;

      svg.appendChild(make('rect', {
        x:'-18', y:'-14', width:'36', height:'28', rx:'5',
        fill:'#3f4749', opacity:'0.65',
        transform:`translate(${f(tx + 2)} ${f(ty + 3)}) rotate(${f(angle)})`,
        'pointer-events':'none'
      }));

      const slot = make('rect', {
        x:'-18', y:'-14', width:'36', height:'28', rx:'5',
        fill:'url(#pocketG)', stroke:'#aeb6b6', 'stroke-width':'2',
        transform:`translate(${f(tx)} ${f(ty)}) rotate(${f(angle)})`
      });
      svg.appendChild(slot);

      const txt = make('text', {
        x:f(tx), y:f(ty + 0.5), 'text-anchor':'middle', 'dominant-baseline':'central',
        fill:'rgba(45,50,51,0.52)', stroke:'rgba(185,193,193,0.38)', 'stroke-width':'0.8',
        'font-family':'Fredoka One, Arial Black, sans-serif', 'font-size':'17',
        transform:`rotate(${f(angle)} ${f(tx)} ${f(ty)})`,
        'pointer-events':'none'
      });
      txt.textContent = val;
      svg.appendChild(txt);

      slotEls.push(slot);
      labelEls.push(txt);
      slotDiceEls.push(null);
      slotInfo.push({ x: tx, y: ty, angle });
    }

    svg.appendChild(make('circle', { cx, cy, r:24, fill:'#697273', stroke:'#aeb6b6', 'stroke-width':'2' }));
    svg.appendChild(make('circle', { cx, cy, r:17, fill:'url(#rimG)', stroke:'#4e5658', 'stroke-width':'1.2', opacity:'0.92' }));

    boardWrap.appendChild(svg);
  };

  function f(n) { return n.toFixed(2); }

  // ── POOL VISUAL — mini dice with random pip values ──────────
  function updatePoolVisual(player) {
    const el = player === 'p1' ? p1Pile : p2Pile;
    el.innerHTML = '';
    COLORS.forEach(color => {
      for (let i = 0; i < pools[player][color]; i++) {
      const val = Math.floor(Math.random() * 6) + 1;
      el.appendChild(makeMiniDie(color, val));
    }
    });
  }

  function makeMiniDie(color, value, extraClass = '') {
    const d = document.createElement('div');
    d.className = 'mini-die ' + colorClass(color) + (extraClass ? ' ' + extraClass : '');
    (MINI_DOTS[value] || []).forEach(([top, left]) => {
      const pip = document.createElement('div');
      pip.className = 'mini-pip';
      pip.style.top  = top  + '%';
      pip.style.left = left + '%';
      d.appendChild(pip);
    });
    return d;
  }

  // ── AUDIO ENGINE ─────────────────────────────────────────────
  const Audio = (() => {
    let ctx = null;
    function getCtx() {
      if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
      return ctx;
    }
    function tone(freq, type, gain, start, dur, dest) {
      const c = getCtx();
      const osc = c.createOscillator();
      const g   = c.createGain();
      osc.type = type; osc.frequency.value = freq;
      g.gain.setValueAtTime(0.001, c.currentTime + start);
      g.gain.linearRampToValueAtTime(gain, c.currentTime + start + 0.03);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + start + dur);
      osc.connect(g).connect(dest || c.destination);
      osc.start(c.currentTime + start);
      osc.stop(c.currentTime + start + dur + 0.05);
    }
    function noiseBurst(duration, start, gain, decay = 1.6, filterFreq = 1200, filterType = 'bandpass') {
      const c = getCtx();
      const frames = Math.max(1, Math.floor(c.sampleRate * duration));
      const buf = c.createBuffer(1, frames, c.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, decay);
      }
      const src = c.createBufferSource();
      const filter = c.createBiquadFilter();
      const g = c.createGain();
      src.buffer = buf;
      filter.type = filterType;
      filter.frequency.value = filterFreq;
      filter.Q.value = 1.8;
      g.gain.value = gain;
      src.connect(filter).connect(g).connect(c.destination);
      src.start(c.currentTime + start);
      src.stop(c.currentTime + start + duration + 0.03);
    }
    return {
      rollLoop(durationMs = 1550) {
        const c = getCtx();
        const total = Math.max(0.25, durationMs / 1000);
        for (let t = 0.01; t < total - 0.08; t += 0.045 + Math.random() * 0.045) {
          const progress = t / total;
          const fade = 1 - progress * 0.38;
          const heavy = Math.random() > 0.68;
          noiseBurst(0.024 + Math.random() * 0.02, t, (heavy ? 0.075 : 0.052) * fade, 2.1, 1050 + Math.random() * 1700, 'bandpass');
          noiseBurst(0.018 + Math.random() * 0.014, t + 0.006, 0.032 * fade, 2.7, 3200 + Math.random() * 2200, 'highpass');
          tone(150 + Math.random() * 190, Math.random() > 0.5 ? 'triangle' : 'square', (heavy ? 0.032 : 0.02) * fade, t, 0.038, c.destination);
          if (heavy) tone(70 + Math.random() * 34, 'sine', 0.055 * fade, t, 0.08, c.destination);
        }
        noiseBurst(0.07, Math.max(0.04, total - 0.18), 0.075, 2.4, 1800, 'bandpass');
        tone(84, 'sine', 0.07, Math.max(0.02, total - 0.16), 0.14, c.destination);
      },
      rollResolve(value = 1) {
        const c = getCtx();
        const notes = [523, 587, 659, 698, 784, 880];
        const root = notes[clamp(value, 1, 6) - 1] || 659;
        noiseBurst(0.035, 0.0, 0.045, 2.8, 2600, 'highpass');
        tone(root, 'triangle', 0.065, 0.0, 0.11, c.destination);
        tone(root * 1.5, 'sine', 0.045, 0.055, 0.14, c.destination);
        tone(root * 2, 'sine', 0.03, 0.115, 0.16, c.destination);
      },
      lidWinFanfare() {
        const c = getCtx();
        noiseBurst(0.12, 0.0, 0.16, 1.8, 2300, 'highpass');
        [[392,0.00],[523,0.06],[659,0.12],[784,0.20],[1047,0.30]].forEach(([fr,t]) => {
          tone(fr, 'triangle', 0.18, t, 0.28, c.destination);
          tone(fr * 0.5, 'sine', 0.08, t, 0.32, c.destination);
        });
        tone(98, 'sine', 0.34, 0.0, 0.55, c.destination);
        tone(1568, 'sine', 0.06, 0.34, 0.24, c.destination);
      },
      placeClink() {
        const c = getCtx();
        noiseBurst(0.045, 0.0, 0.075, 2.8, 2300, 'highpass');
        tone(1320, 'sine', 0.12, 0.0, 0.12, c.destination);
        tone(1760, 'triangle', 0.07, 0.025, 0.10, c.destination);
        tone(410, 'sine', 0.04, 0.0, 0.09, c.destination);
      },
      trashCrash(intensity = 1) {
        const c = getCtx();
        const now = c.currentTime;
        const power = clamp(1 + Math.max(0, intensity - 1) * 0.13, 1, 2.35);
        const fanfareGain = clamp(0.10 + intensity * 0.02, 0.12, 0.38);
        const bitePitch = clamp(1 + intensity * 0.018, 1.02, 1.34);

        // Heavy rock-into-can impact: sub slam first, then metallic shell ring.
        const thud = c.createOscillator();
        const thudGain = c.createGain();
        thud.type = 'sine';
        thud.frequency.setValueAtTime(88, now);
        thud.frequency.exponentialRampToValueAtTime(30, now + 0.34);
        thudGain.gain.setValueAtTime(0.001, now);
        thudGain.gain.linearRampToValueAtTime(0.92 * power, now + 0.018);
        thudGain.gain.exponentialRampToValueAtTime(0.001, now + 0.62);
        thud.connect(thudGain).connect(c.destination);
        thud.start(now);
        thud.stop(now + 0.66);

        noiseBurst(0.64, 0.0, 0.62 * power, 0.52, 520, 'bandpass');
        noiseBurst(0.26, 0.015, 0.40 * power, 0.72, 2450, 'highpass');
        noiseBurst(0.20, 0.12, 0.28 * power, 0.95, 1450, 'bandpass');
        noiseBurst(0.16, 0.26, 0.20 * power, 1.15, 3300, 'highpass');

        [[196,0.00,0.34,0.30],[247,0.03,0.42,0.23],[311,0.06,0.36,0.18],[415,0.11,0.32,0.14],[622,0.18,0.24,0.10]].forEach(([fr,t,dur,gain]) => {
          tone(fr, 'sawtooth', gain * power, t, dur, c.destination);
          tone(fr * 1.01, 'triangle', gain * 0.5 * power, t + 0.018, dur + 0.08, c.destination);
        });

        [[94,0.09,0.24],[71,0.28,0.28],[53,0.46,0.34]].forEach(([fr,t,dur]) => {
          tone(fr, 'sine', 0.32 * power, t, dur, c.destination);
        });

        [[980,0.03],[1220,0.16],[760,0.31]].forEach(([fr,t]) => {
          tone(fr, 'square', 0.08 * power, t, 0.07, c.destination);
        });

        // Hungry-can victory stab for each eaten die; it gets meaner as the can fills.
        [[220,0.00],[294,0.055],[392,0.11],[523,0.18]].forEach(([fr,t], i) => {
          tone(fr * bitePitch, 'sawtooth', fanfareGain * (1 - i * 0.12), t, 0.18, c.destination);
          tone(fr * 0.5, 'square', fanfareGain * 0.48, t + 0.018, 0.22, c.destination);
        });
        if (intensity >= 4) noiseBurst(0.22, 0.36, 0.22 * power, 1.05, 980, 'bandpass');
        if (intensity >= 8) tone(1568, 'triangle', 0.08 * power, 0.40, 0.18, c.destination);
      },
      // Punchy start-game fanfare — ascending brass stab
      startFanfare() {
        const c = getCtx();
        // Snare hit
        const buf = c.createBuffer(1, c.sampleRate * 0.15, c.sampleRate);
        const d   = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 3);
        const snare = c.createBufferSource(); snare.buffer = buf;
        const sg = c.createGain(); sg.gain.value = 0.25;
        snare.connect(sg).connect(c.destination); snare.start(c.currentTime + 0.05);
        // Ascending brass hits
        [[196, 0.0], [247, 0.1], [294, 0.2], [392, 0.3], [523, 0.4]].forEach(([fr, t]) => {
          tone(fr, 'sawtooth', 0.18, t, 0.28, c.destination);
          tone(fr * 1.5, 'square', 0.06, t, 0.22, c.destination);
        });
        // Bass thud
        tone(65, 'sine', 0.35, 0.0, 0.5, c.destination);
        tone(98, 'sine', 0.18, 0.4, 0.4, c.destination);
      },
      // Round start — sharp 3-note "ready" sting
      roundFanfare() {
        const c = getCtx();
        [[330, 0.0], [392, 0.12], [523, 0.24]].forEach(([fr, t]) => {
          tone(fr, 'triangle', 0.2, t, 0.28, c.destination);
        });
        tone(130, 'sine', 0.22, 0.0, 0.35, c.destination);
      },
      // Place tone — 3x punchy hit
      placeTone() {
        const c = getCtx();
        // Snare crack
        const buf = c.createBuffer(1, Math.floor(c.sampleRate * 0.09), c.sampleRate);
        const bd  = buf.getChannelData(0);
        for (let i = 0; i < bd.length; i++) bd[i] = (Math.random()*2-1) * Math.pow(1-i/bd.length, 2.2);
        const sn = c.createBufferSource(); sn.buffer = buf;
        const sg = c.createGain(); sg.gain.value = 0.28;
        sn.connect(sg).connect(c.destination); sn.start(c.currentTime);
        // 3-note ascending punch
        [[523,0.0,0.30],[659,0.10,0.28],[784,0.20,0.32]].forEach(([fr,t,dur]) => {
          tone(fr, 'triangle', 0.24, t, dur, c.destination);
          tone(fr*0.5, 'sine',   0.10, t, dur+0.1, c.destination);
        });
        // Bass thud
        tone(130, 'sine', 0.32, 0.0, 0.4, c.destination);
      },
      // Round WON — 20x massive fanfare
      roundWonFanfare(durationMs = 1700) {
        const c = getCtx(); const now = c.currentTime;
        const total = clamp(durationMs / 1000, 1.2, 3.8);
        function snareHit(t, vol) {
          const buf = c.createBuffer(1, Math.floor(c.sampleRate*0.14), c.sampleRate);
          const d = buf.getChannelData(0);
          for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.6);
          const s=c.createBufferSource(); s.buffer=buf;
          const g=c.createGain(); g.gain.value=vol;
          s.connect(g).connect(c.destination); s.start(now+t);
        }
        // 3 snare hits — intro punch
        snareHit(0.00, 0.38);
        snareHit(Math.min(0.22, total * 0.18), 0.32);
        snareHit(Math.min(0.44, total * 0.32), 0.42);
        // 7-note full ascending run — triangle + sine harmonic each
        [[262,0.0],[330,0.10],[392,0.20],[523,0.31],[659,0.42],[784,0.53],[1047,0.65]].forEach(([fr,t]) => {
          tone(fr,     'triangle', 0.26, t,      Math.min(0.55, total * 0.42), c.destination);
          tone(fr*1.5, 'sine',     0.09, t+0.02, 0.40, c.destination);
        });
        // Big bass hits
        tone(65,  'sine', 0.45, 0.00, Math.min(0.95, total * 0.55), c.destination);
        tone(98,  'sine', 0.35, 0.44, Math.min(0.85, total * 0.45), c.destination);
        tone(130, 'sine', 0.28, 0.65, Math.min(0.72, total * 0.35), c.destination);
        // Sustain chord at peak
        [523,659,784,1047].forEach(fr => tone(fr,'sine',0.13,0.65,Math.max(0.65, total - 0.75),c.destination));
        // High shimmer
        for (let t = 0.7; t < total - 0.08; t += 0.24) {
          tone(1760 + Math.random() * 520, 'sine', 0.035, t, 0.16, c.destination);
          if (t > 0.95 && Math.random() > 0.35) snareHit(t, 0.16);
        }
      },
      // Win
      winFanfare() {
        const c = getCtx();
        [[262, 0.0],[330, 0.08],[392, 0.16],[523, 0.25],[659, 0.35],[784, 0.45]].forEach(([fr, t]) => {
          tone(fr, 'triangle', 0.18, t, 0.5, c.destination);
        });
        tone(131, 'sine', 0.3, 0.0, 0.8, c.destination);
        tone(196, 'sine', 0.2, 0.45, 0.6, c.destination);
      },
      megaWinFanfare() {
        const c = getCtx();
        const now = c.currentTime;
        function burstSnare(t, gain = 0.34) {
          const frames = Math.floor(c.sampleRate * 0.18);
          const buf = c.createBuffer(1, frames, c.sampleRate);
          const d = buf.getChannelData(0);
          for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 1.2);
          const src = c.createBufferSource();
          const g = c.createGain();
          src.buffer = buf;
          g.gain.value = gain;
          src.connect(g).connect(c.destination);
          src.start(now + t);
        }
        [0, 0.13, 0.26, 0.54, 0.72, 0.9].forEach((t, i) => burstSnare(t, i < 3 ? 0.34 : 0.26));
        noiseBurst(0.55, 0.02, 0.35, 1.15, 2800, 'highpass');
        noiseBurst(0.9, 0.30, 0.22, 1.8, 1200, 'bandpass');
        [[196,0.00],[247,0.08],[294,0.16],[392,0.25],[523,0.36],[659,0.48],[784,0.60],[1047,0.74],[1319,0.92]].forEach(([fr,t], i) => {
          tone(fr, 'triangle', 0.24 - i * 0.012, t, 0.62, c.destination);
          tone(fr * 1.5, 'sine', 0.07, t + 0.025, 0.42, c.destination);
        });
        [[65,0.0,1.25,0.52],[98,0.34,1.05,0.38],[131,0.72,0.9,0.30]].forEach(([fr,t,dur,gain]) => {
          tone(fr, 'sine', gain, t, dur, c.destination);
        });
        [[523,1.05],[659,1.05],[784,1.05],[1047,1.05],[1319,1.05]].forEach(([fr,t]) => {
          tone(fr, 'sine', 0.11, t, 1.35, c.destination);
        });
        [1.28, 1.55, 1.82].forEach(t => noiseBurst(0.16, t, 0.11, 2.6, 4200, 'highpass'));
      },
      // Trash fanfare — big dramatic womp + crash
      trashSting() {
        const c = getCtx();
        const now = c.currentTime;
        // Crash noise burst
        const buf = c.createBuffer(1, Math.floor(c.sampleRate * 0.35), c.sampleRate);
        const bd  = buf.getChannelData(0);
        for (let i = 0; i < bd.length; i++) bd[i] = (Math.random()*2-1) * Math.pow(1 - i/bd.length, 0.6);
        const nb = c.createBufferSource(); nb.buffer = buf;
        const ng = c.createGain(); ng.gain.value = 0.28;
        nb.connect(ng).connect(c.destination); nb.start(now);
        // Descending womp womp
        [[220,0.0,0.22],[185,0.14,0.22],[155,0.28,0.22],[130,0.42,0.30],[98,0.58,0.40]].forEach(([fr,t,dur]) => {
          tone(fr, 'sawtooth', 0.20, t, dur, c.destination);
        });
        // Low thud
        tone(55, 'sine', 0.35, 0.0, 0.5, c.destination);
        // High accent blip
        tone(880, 'triangle', 0.10, 0.02, 0.08, c.destination);
      }
    };
  })();

  // ── DIE RENDERING ────────────────────────────────────────────
  function renderDie(value, player, color) {
    const el = getDie(player);
    el.className = 'die ' + colorClass(color || (player === 'p1' ? 'yellow' : 'green'));
    el.innerHTML = '';
    for (let r = 0; r < 3; r++) {
      for (let c = 0; c < 3; c++) {
        const cell = document.createElement('div');
        cell.className = 'dot-cell';
        const hasDot = (DOTS[value] || []).some(([dr,dc]) => dr===r && dc===c);
        if (hasDot) {
          const dot = document.createElement('div');
          dot.className = 'dot';
          cell.appendChild(dot);
        }
        el.appendChild(cell);
      }
    }
  }

  // Update pips only — does NOT reset class/animation
  function setPips(value, player) {
    const el = getDie(player);
    el.innerHTML = '';
    for (let row = 0; row < 3; row++) {
      for (let col = 0; col < 3; col++) {
        const cell = document.createElement('div');
        cell.className = 'dot-cell';
        if ((DOTS[value] || []).some(([dr,dc]) => dr===row && dc===col)) {
          const dot = document.createElement('div');
          dot.className = 'dot';
          cell.appendChild(dot);
        }
        el.appendChild(cell);
      }
    }
  }

  function clearDie(player) {
    const targets = player ? [getDie(player)] : [p1Die, p2Die];
    targets.forEach(el => {
      el.className = 'die idle';
      el.style.opacity = '';
      el.innerHTML = Array(9).fill('<div class="dot-cell"></div>').join('');
    });
  }

  function makeDieClone(player, color) {
    const source = getDie(player);
    const r = source.getBoundingClientRect();
    const clone = source.cloneNode(true);
    clone.removeAttribute('id');
    clone.className = 'die ' + colorClass(color) + ' travelling-die';
    clone.style.left = r.left + 'px';
    clone.style.top = r.top + 'px';
    clone.style.width = r.width + 'px';
    clone.style.height = r.height + 'px';
    clone.style.transform = 'rotate(0deg) scale(1)';
    document.body.appendChild(clone);
    source.style.opacity = '0';
    return { clone, source, rect: r };
  }

  function travelRolledDieToSlot(player, color, idx, done) {
    const { clone, source, rect } = makeDieClone(player, color);
    const target = slotEls[idx].getBoundingClientRect();
    const size = Math.max(26, Math.min(rect.width * 0.62, target.width * 0.42));
    requestAnimationFrame(() => {
      clone.style.left = (target.left + target.width / 2 - size / 2) + 'px';
      clone.style.top = (target.top + target.height / 2 - size / 2) + 'px';
      clone.style.width = size + 'px';
      clone.style.height = size + 'px';
      clone.style.transform = 'rotate(18deg) scale(0.92)';
    });
    setTimeout(() => {
      clone.remove();
      source.style.opacity = '';
      clearDie(player);
      done();
    }, 640);
  }

  function travelRolledDieToTrash(player, color, done) {
    const { clone, source, rect } = makeDieClone(player, color);
    const target = trashCan.getBoundingClientRect();
    const size = Math.max(18, Math.min(rect.width * 0.48, target.width * 0.34));
    requestAnimationFrame(() => {
      clone.classList.add('to-trash');
      clone.style.left = (target.left + target.width / 2 - size / 2) + 'px';
      clone.style.top = (target.top + target.height * 0.3 - size / 2) + 'px';
      clone.style.width = size + 'px';
      clone.style.height = size + 'px';
      clone.style.transform = 'rotate(34deg) scale(0.34)';
    });
    setTimeout(() => {
      clone.remove();
      source.style.opacity = '';
      clearDie(player);
      done();
    }, 640);
  }

  function triggerTrashCanImpact(load) {
    trashCan.style.setProperty('--can-feed-scale', clamp(2.85 + load * 0.2, 3, 4.85).toFixed(2));
    trashCan.style.setProperty('--can-feed-glow', Math.round(clamp(34 + load * 4.2, 34, 112)) + 'px');
    trashCan.style.setProperty('--can-feed-duration', Math.round(clamp(650 + load * 34, 720, 1320)) + 'ms');
    trashCan.classList.remove('flash');
    void trashCan.offsetWidth;
    trashCan.classList.add('flash');
  }

  function triggerLidWinPulse() {
    boardWrap.classList.remove('lid-win-pulse');
    void boardWrap.offsetWidth;
    boardWrap.classList.add('lid-win-pulse');
    boardWrap.addEventListener('animationend', () => boardWrap.classList.remove('lid-win-pulse'), { once: true });
    Audio.lidWinFanfare();
  }

  function clearVictoryEffects() {
    document.querySelectorAll('.victory-cannon-die, .victory-screen-burst').forEach(el => el.remove());
    boardWrap.classList.remove('game-win-spin');
    trashCan.classList.remove('victory-erupt');
  }

  function triggerGameWinCelebration(winner) {
    clearVictoryEffects();
    if (winner !== 'p1') {
      Audio.winFanfare();
      return;
    }

    const burst = document.createElement('div');
    burst.className = 'victory-screen-burst';
    document.body.appendChild(burst);
    setTimeout(() => burst.remove(), 1700);

    boardWrap.classList.remove('game-win-spin');
    void boardWrap.offsetWidth;
    boardWrap.classList.add('game-win-spin');
    boardWrap.addEventListener('animationend', () => boardWrap.classList.remove('game-win-spin'), { once: true });

    trashCan.classList.remove('victory-erupt');
    void trashCan.offsetWidth;
    trashCan.classList.add('victory-erupt');
    trashCan.addEventListener('animationend', () => trashCan.classList.remove('victory-erupt'), { once: true });

    Audio.megaWinFanfare();

    const canR = trashCan.getBoundingClientRect();
    const sx = canR.left + canR.width * 0.5;
    const sy = canR.top + canR.height * 0.23;
    const burstCount = Math.round(clamp(40 + totalTrashedDice() * 2.4, 46, 88));
    for (let i = 0; i < burstCount; i++) {
      const color = Math.random() < 0.52 ? 'yellow' : 'green';
      const die = makeMiniDie(color, Math.floor(Math.random() * 6) + 1, 'victory-cannon-die');
      const spread = (Math.random() - 0.5) * window.innerWidth * 1.18;
      const targetX = clamp(sx + spread, 14, window.innerWidth - 14);
      const targetY = clamp(sy - window.innerHeight * (0.18 + Math.random() * 0.52) + Math.random() * 120, 12, window.innerHeight - 14);
      const midX = (targetX - sx) * (0.34 + Math.random() * 0.22);
      const midY = -window.innerHeight * (0.24 + Math.random() * 0.34);
      const duration = Math.round(1200 + Math.random() * 980);
      const delay = Math.round(i * 14 + Math.random() * 110);

      die.style.left = sx + 'px';
      die.style.top = sy + 'px';
      die.style.setProperty('--mx', midX.toFixed(1) + 'px');
      die.style.setProperty('--my', midY.toFixed(1) + 'px');
      die.style.setProperty('--tx', (targetX - sx).toFixed(1) + 'px');
      die.style.setProperty('--ty', (targetY - sy).toFixed(1) + 'px');
      die.style.setProperty('--rot', Math.round(540 + Math.random() * 1260) + 'deg');
      die.style.setProperty('--cannon-duration', duration + 'ms');
      die.style.setProperty('--cannon-delay', delay + 'ms');
      document.body.appendChild(die);
      setTimeout(() => die.remove(), duration + delay + 260);
    }
  }

  // ── UI SYNC ──────────────────────────────────────────────────
  function syncUI() {
    p1PoolEl.textContent = totalDice('p1');
    p2PoolEl.textContent = totalDice('p2');
    p1TurnTag.classList.toggle('active', current === 'p1');
    p2TurnTag.classList.toggle('active', current === 'p2');
    updatePoolVisual('p1');
    updatePoolVisual('p2');

    const isP1 = current === 'p1';
    statusText.textContent = isP1 ? "Your Turn" : "CPU's Turn";
    turnDot.style.background = isP1 ? '#f5c800' : '#2a9a2a';
    rollBtn.className = 'roll-btn ' + current;
  }

  function setMsg(text, type) {
    msgEl.textContent = text;
    msgEl.className   = 'message' + (type ? ' ' + type : '');
  }

  function openingRoll() {
    let p1;
    let p2;
    do {
      p1 = Math.floor(Math.random() * 6) + 1;
      p2 = Math.floor(Math.random() * 6) + 1;
    } while (p1 === p2);
    return { p1, p2, starter: p1 > p2 ? 'p1' : 'p2' };
  }

  // ── INIT ─────────────────────────────────────────────────────
  function init() {
    board     = Array(6).fill(null);
    pools     = { p1: { yellow: 20, green: 0 }, p2: { yellow: 0, green: 20 } };
    trashed   = { p1: 0,  p2: 0  };
    current   = 'p1';
    round     = 1;
    busy      = false;
    totalRolls= 0;
    gameStarted = true;

    clearVictoryEffects();
    overlay.classList.remove('show', 'victory');

    requestAnimationFrame(() => {
      buildSlots();
      clearDie(null);
      const opener = openingRoll();
      current = opener.starter;
      renderDie(opener.p1, 'p1', 'yellow');
      renderDie(opener.p2, 'p2', 'green');
      syncUI();
      setMsg(`Opening roll: You ${opener.p1}, CPU ${opener.p2} - ${PLAYER_NAME[current]} start${current === 'p1' ? '' : 's'}.`);
      if (current === 'p1') clearDie('p1');
      rollBtn.disabled = current !== 'p1';
      if (current === 'p2') setTimeout(() => doRoll(), 1150);
    });
  }

  // ── ROLL ─────────────────────────────────────────────────────
  rollBtn.addEventListener('click', doRoll);
  playAgainBtn.addEventListener('click', init);

  function doRoll() {
    if (busy) return;
    if (current === 'p1' && rollBtn.disabled) return; // only block human; CPU rolls freely
    busy = true;
    rollBtn.disabled = true;
    totalRolls++;

    const rollColor = takeDie(current);
    if (!rollColor) {
      gameOver(current === 'p1' ? 'p2' : 'p1');
      return;
    }

    const value = Math.floor(Math.random() * 6) + 1;

    // Start tumble + spinning pip values
    const activeDie = getDie(current);
    activeDie.className = 'die ' + colorClass(rollColor) + ' rolling';
    setPips(Math.floor(Math.random() * 6) + 1, current);
    Audio.rollLoop(ROLL_ANIMATION_MS);

    // Fast phase (80–1000ms every 85ms) then slow phase (1100–1430ms every 165ms)
    const spinAt = [];
    for (let t = 55;  t <= 620; t += 65)  spinAt.push(t);
    for (let t = 700; t <= 805; t += 105) spinAt.push(t);
    const spinHandles = spinAt.map(t =>
      setTimeout(() => setPips(Math.floor(Math.random() * 6) + 1, current), t)
    );

    setTimeout(() => {
      spinHandles.forEach(clearTimeout);
      renderDie(value, current, rollColor);
      getDie(current).classList.add('roll-resolved');
      Audio.rollResolve(value);
      const idx   = value - 1;
      const taken = board[idx] !== null;
      setMsg(current === 'p1' ? `You rolled a ${value}...` : `CPU rolled a ${value}...`);
      setTimeout(() => {
        taken
          ? travelRolledDieToTrash(current, rollColor, () => handleTrash(value, idx, rollColor))
          : travelRolledDieToSlot(current, rollColor, idx, () => handlePlace(value, idx, rollColor));
      }, ROLL_REVEAL_HOLD_MS);
    }, ROLL_ANIMATION_MS);
  }

  function handlePlace(value, idx, color) {
    board[idx] = { player: current, color };

    const slot  = slotEls[idx];
    paintSlot(idx, board[idx]);
    slot.classList.add('anim-place');
    slot.addEventListener('animationend', () => slot.classList.remove('anim-place'), { once: true });

    setMsg(current === 'p1' ? `You placed a ${value} on the lid!` : `CPU placed a ${value} on the lid`, 'ok');
    Audio.placeClink();
    syncUI();

    const filled = board.filter(s => s !== null).length;
    if (filled === 6) {
      triggerLidWinPulse();
      setTimeout(endRound, TURN_HANDOFF_MS);
    } else {
      setTimeout(nextTurn, TURN_HANDOFF_MS);
    }
  }

  function handleTrash(value, idx, color) {
    trashed[current]++;

    const slot = slotEls[idx];
    slot.classList.add('anim-trash');
    slot.addEventListener('animationend', () => slot.classList.remove('anim-trash'), { once:true });

    const owner = board[idx].player === 'p1' ? 'your die' : "CPU's die";
    setMsg(current === 'p1'
      ? `You rolled a ${value} — that space has ${owner}! TRASHED 🗑️`
      : `CPU rolled a ${value} — that space has ${owner}! TRASHED 🗑️`, 'trash');
    const canLoad = totalTrashedDice();
    triggerTrashCanImpact(canLoad);
    Audio.trashCrash(canLoad);
    syncUI();

    if (totalDice(current) <= 0) {
      const winner = current === 'p1' ? 'p2' : 'p1';
      setTimeout(() => gameOver(winner), 950);
      return;
    }

    setTimeout(nextTurn, TURN_HANDOFF_MS + 250);
  }

  // ── DICE FLY TO POOL ─────────────────────────────────────────
  function spillDurationForDice(diceWon) {
    const count = Math.max(1, diceWon);
    return clamp(1300 + count * 520 + Math.max(0, count - 6) * 180, 1600, 9000);
  }

  function animateCanPourToPool(winner, lidDice, spillDuration = spillDurationForDice(lidDice.length), spillLoad = lidDice.length) {
    const pileEl  = winner === 'p1' ? p1Pile : p2Pile;
    const pileR   = pileEl.getBoundingClientRect();
    const canR = trashCan.getBoundingClientRect();
    const diceWon = Math.max(1, lidDice.length);
    const visualLoad = Math.max(diceWon, spillLoad);
    const travelMs = clamp(700 + visualLoad * 28, 820, 1250);
    const pourLeadInMs = 220;
    const pourTailMs = 360;
    const canShakeMs = clamp(spillDuration * 0.92, 1300, 8500);
    trashCan.classList.remove('pour');
    void trashCan.offsetWidth;
    trashCan.style.animationDuration = canShakeMs + 'ms';
    trashCan.classList.add('pour');

    lidDice.forEach((die, i) => {
      const fill = slotColors(die.color).fill;
      const sx = canR.left + canR.width * (0.35 + Math.random() * 0.3);
      const sy = canR.top + canR.height * (0.25 + Math.random() * 0.1);
      const tx = pileR.left + pileR.width * (0.25 + Math.random() * 0.5);
      const ty = pileR.top + pileR.height * (0.25 + Math.random() * 0.5);
      const el = document.createElement('div');
      el.className = 'can-pour-die';
      el.style.background = fill;
      el.style.left = sx + 'px';
      el.style.top = sy + 'px';
      el.style.transform = `translate(-50%,-50%) rotate(${i * 17 - 42}deg) scale(1.15)`;
      el.style.transition =
        `left ${travelMs}ms cubic-bezier(.16,.86,.22,1), ` +
        `top ${travelMs}ms cubic-bezier(.16,.86,.22,1), ` +
        `transform ${travelMs}ms ease, ` +
        `opacity 180ms ease ${Math.max(0, travelMs - 180)}ms`;
      document.body.appendChild(el);

      const available = Math.max(0, spillDuration - travelMs - pourLeadInMs - pourTailMs);
      const delay = pourLeadInMs + (diceWon === 1 ? 0 : i * (available / (diceWon - 1)));
      setTimeout(() => {
        el.style.left = tx + 'px';
        el.style.top = ty + 'px';
        el.style.transform = `translate(-50%,-50%) rotate(${160 + i * 23}deg) scale(0.42)`;
        el.style.opacity = '0';
      }, delay + 40);
      setTimeout(() => el.remove(), delay + travelMs + pourTailMs);
    });

    setTimeout(() => {
      trashCan.classList.remove('pour');
      trashCan.style.animationDuration = '';
    }, canShakeMs + 80);
    return spillDuration;
  }

  function showClaimBadge(winner, lidDice, spillDuration = 1450) {
    const pileEl = winner === 'p1' ? p1Pile : p2Pile;
    const r = pileEl.getBoundingClientRect();
    const mix = diceMix(lidDice);
    const badge = document.createElement('div');
    const main = document.createElement('div');
    const sub = document.createElement('div');
    badge.className = 'claim-badge ' + winner;
    main.className = 'claim-main';
    sub.className = 'claim-sub';
    main.textContent = `+${lidDice.length} DICE`;
    sub.textContent = `${mix.yellow} yellow · ${mix.green} green`;
    badge.appendChild(main);
    badge.appendChild(sub);
    badge.style.left = clamp(r.left + r.width / 2, 82, window.innerWidth - 82) + 'px';
    badge.style.top = clamp(r.top + r.height / 2, 58, window.innerHeight - 58) + 'px';
    document.body.appendChild(badge);
    setTimeout(() => badge.remove(), clamp(spillDuration + 500, 1700, 9500));
  }

  // ── ROUND WIN ────────────────────────────────────────────────
  function endRound() {
    const winner = current;
    const lidDice = board.filter(Boolean);
    const wLabel = winner === 'p1' ? 'You complete' : 'CPU completes';
    const mix = diceMix(lidDice);
    const spillLoad = lidDice.length + totalTrashedDice();
    const spillDuration = spillDurationForDice(spillLoad);

    setMsg(`${wLabel} the lid and claim all ${lidDice.length} dice (${mix.yellow}Y/${mix.green}G)! 🎉`, 'win');

    // Flash
    roundFlash.className = '';
    void roundFlash.offsetWidth;
    roundFlash.className = 'round-flash ' + winner;
    Audio.roundWonFanfare(spillDuration);

    // Trash can empties the claimed set into the winner's pile.
    showClaimBadge(winner, lidDice, spillDuration);
    animateCanPourToPool(winner, lidDice, spillDuration, spillLoad);

    // Update pool counts after dice "arrive"
    setTimeout(() => {
      lidDice.forEach(die => pools[winner][die.color]++);
      board = Array(6).fill(null);
      round++;
      syncUI();
    }, spillDuration);

    setTimeout(() => {
      slotEls.forEach((s, i) => {
        s.setAttribute('fill',   'url(#pocketG)');
        s.setAttribute('stroke', '#aeb6b6');
        s.classList.remove('anim-place', 'anim-trash');
        labelEls[i].setAttribute('fill', 'rgba(45,50,51,0.52)');
        if (slotDiceEls[i]) {
          slotDiceEls[i].remove();
          slotDiceEls[i] = null;
        }
      });

      if (totalDice('p1') <= 0) { gameOver('p2'); return; }
      if (totalDice('p2') <= 0) { gameOver('p1'); return; }

      current = winner;
      clearDie(null);
      syncUI();
      if (current === 'p2') {
        rollBtn.disabled = true;
        setTimeout(() => { busy = false; doRoll(); }, CPU_START_MS);
      } else {
        setMsg(`Round ${round} — Your turn!`);
        rollBtn.disabled = false;
        busy = false;
      }
    }, spillDuration + 260);
  }

  // ── GAME OVER ────────────────────────────────────────────────
  function gameOver(winner) {
    overlayTitle.textContent = winner === 'p1' ? 'You Win! 🎉' : 'CPU Wins!';
    overlaySub.textContent   = winner === 'p1' ? 'CPU has no dice left' : 'You have no dice left';
    overlayStats.textContent = `${round - 1} rounds · ${totalRolls} rolls · trashed ${trashed.p1}/${trashed.p2}`;
    overlay.classList.toggle('victory', winner === 'p1');
    overlay.classList.add('show');
    triggerGameWinCelebration(winner);
  }

  // ── NEXT TURN ────────────────────────────────────────────────
  function nextTurn() {
    current = current === 'p1' ? 'p2' : 'p1';

    if (totalDice(current) <= 0) {
      const winner = current === 'p1' ? 'p2' : 'p1';
      gameOver(winner);
      return;
    }

    clearDie(current);
    syncUI();
    if (current === 'p2') {
      rollBtn.disabled = true;
      setTimeout(() => { busy = false; doRoll(); }, CPU_START_MS);
    } else {
      setMsg('Your turn — tap ROLL');
      rollBtn.disabled = false;
      busy = false;
    }
  }

  // ── BOOT ─────────────────────────────────────────────────────
  document.getElementById('startBtn').addEventListener('click', () => {
    if (gameStarted) return;
    const so = document.getElementById('startOverlay');
    document.getElementById('startBtn').disabled = true;
    so.classList.add('hide');
    setTimeout(() => { so.style.display = 'none'; }, 520);
    Audio.startFanfare();
    init();
  });

  window.addEventListener('load', () => {
    // Pre-build slots so board is visible behind start overlay
    requestAnimationFrame(buildSlots);
  });
  window.addEventListener('resize', () => {
    if (!slotEls.length) return;
    buildSlots();
    if (!Array.isArray(board)) return;
    board.forEach((die, i) => {
      if (die) paintSlot(i, die);
    });
  });

})();
</script>
</body>
</html>
